name: Auto Merge Main (Deprecated)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deprecated:
    name: Promotion Moved to Zetherion
    runs-on: ubuntu-latest
    steps:
      - name: Summarize control-plane ownership
        shell: bash
        run: |
          {
            echo "### Promotion Ownership"
            echo ""
            echo "Automatic merge and promotion are now owned by the Zetherion control plane."
            echo "Do not use GitHub Actions to promote \`codex/*\` branches to \`main\`."
          } >> "$GITHUB_STEP_SUMMARY"
