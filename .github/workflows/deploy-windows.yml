name: Deploy Windows

on:
  workflow_run:
    workflows:
      - CI/CD Pipeline
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      sha:
        description: Commit SHA to deploy (defaults to head of provided ref)
        required: false
        type: string
      ref:
        description: Ref to deploy when SHA is omitted
        required: false
        default: refs/heads/main
        type: string

concurrency:
  group: deploy-windows-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy and Verify Windows Runtime
    runs-on:
      - self-hosted
      - windows
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      actions: read
    env:
      WINDOWS_DEPLOY_PATH: C:\ZetherionAI
      WINDOWS_LAST_GOOD_SHA_PATH: C:\ZetherionAI\data\last-good-sha.txt
      WINDOWS_DEPLOY_LOCK_PATH: C:\ZetherionAI\data\deploy.lock
      WINDOWS_DEPLOYMENT_RECEIPTS_PATH: C:\ZetherionAI\data\deployment-receipts
      WINDOWS_RESILIENCE_ALLOW_SERVICE_FALLBACK: "true"
      WINDOWS_REQUIRE_PROMOTIONS_TASK: "false"
    steps:
      - name: Determine deployment target
        id: target
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $eventName = "${{ github.event_name }}"
          $targetSha = ""
          $targetRef = ""
          $sourceWorkflowRunId = ""

          if ($eventName -eq "workflow_run") {
            $targetSha = "${{ github.event.workflow_run.head_sha }}"
            $targetRef = "refs/heads/${{ github.event.workflow_run.head_branch }}"
            $sourceWorkflowRunId = "${{ github.event.workflow_run.id }}"
          } else {
            $targetRef = "${{ inputs.ref }}"
            if (-not $targetRef) {
              $targetRef = "refs/heads/main"
            }

            $targetSha = "${{ inputs.sha }}"
            if (-not $targetSha) {
              $lsRemote = git ls-remote "https://github.com/${{ github.repository }}.git" $targetRef
              if (-not $lsRemote) {
                throw "Unable to resolve SHA for ref: $targetRef"
              }
              $targetSha = ($lsRemote -split "\s+")[0]
            }
            $sourceWorkflowRunId = "${{ github.run_id }}"
          }

          if (-not $targetSha) {
            throw "Resolved target SHA is empty."
          }

          "target_sha=$targetSha" >> $env:GITHUB_OUTPUT
          "target_ref=$targetRef" >> $env:GITHUB_OUTPUT
          "source_workflow_run_id=$sourceWorkflowRunId" >> $env:GITHUB_OUTPUT

      - name: Checkout deployment scripts for target commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.target.outputs.target_sha }}

      - name: Register resilience startup/watchdog/promotions tasks
        id: resilience_register
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $registrationPath = Join-Path $PWD "resilience-registration.json"
          $registrationExitCode = 0
          & ./scripts/windows/register-resilience-tasks.ps1 `
            -DeployPath "$env:WINDOWS_DEPLOY_PATH" `
            -OutputPath "$registrationPath"
          $registrationExitCode = $LASTEXITCODE

          if (Test-Path $registrationPath) {
            $registration = Get-Content $registrationPath -Raw | ConvertFrom-Json
            $registrationStatus = [string]$registration.status
            if (-not $registrationStatus) {
              $registrationStatus = "unknown"
            }

            $registrationFailureCode = ""
            if ($registration.details -and $registration.details.failure_code) {
              $registrationFailureCode = [string]$registration.details.failure_code
            }
            $bootstrapRequired = "false"
            if ($registration.details -and $null -ne $registration.details.bootstrap_required) {
              $bootstrapRequired = ([bool]$registration.details.bootstrap_required).ToString().ToLowerInvariant()
            }

            "registration_status=$registrationStatus" >> $env:GITHUB_OUTPUT
            "failure_code=$registrationFailureCode" >> $env:GITHUB_OUTPUT
            "bootstrap_required=$bootstrapRequired" >> $env:GITHUB_OUTPUT
          } else {
            "registration_status=missing_output" >> $env:GITHUB_OUTPUT
            "failure_code=" >> $env:GITHUB_OUTPUT
            "bootstrap_required=false" >> $env:GITHUB_OUTPUT
          }

          if ($registrationExitCode -ne 0) {
            Write-Warning ("register-resilience-tasks returned exit code {0}; continuing with readiness checks and receipt gating." -f $registrationExitCode)
          }

          exit 0

      - name: Verify resilience readiness
        id: resilience
        shell: pwsh
        continue-on-error: true
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $readinessPath = Join-Path $PWD "resilience-ready.json"
          & ./scripts/windows/check-resilience-ready.ps1 `
            -DeployPath "$env:WINDOWS_DEPLOY_PATH" `
            -OutputPath "$readinessPath"
          $exitCode = $LASTEXITCODE

          if (Test-Path $readinessPath) {
            $readiness = Get-Content $readinessPath -Raw | ConvertFrom-Json
            "recovery_tasks_registered=$($readiness.checks.recovery_tasks_registered)" >> $env:GITHUB_OUTPUT
            "promotions_task_registered=$($readiness.checks.promotions_task_registered)" >> $env:GITHUB_OUTPUT
            "runner_service_persistent=$($readiness.checks.runner_service_persistent)" >> $env:GITHUB_OUTPUT
            "docker_service_persistent=$($readiness.checks.docker_service_persistent)" >> $env:GITHUB_OUTPUT
          } else {
            "recovery_tasks_registered=false" >> $env:GITHUB_OUTPUT
            "promotions_task_registered=false" >> $env:GITHUB_OUTPUT
            "runner_service_persistent=false" >> $env:GITHUB_OUTPUT
            "docker_service_persistent=false" >> $env:GITHUB_OUTPUT
          }

          if ($exitCode -ne 0) {
            exit $exitCode
          }

      - name: Deploy target SHA on Windows host
        id: deploy
        shell: pwsh
        continue-on-error: true
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $deployResultPath = Join-Path $PWD "deploy-result.json"
          $deployDiagnosticsPath = Join-Path $PWD "deploy-container-diagnostics.json"
          $deployLogsPath = Join-Path $PWD "deploy-container-logs.txt"
          $exitCode = 0

          & ./scripts/windows/deploy-runner.ps1 `
            -DeployPath "$env:WINDOWS_DEPLOY_PATH" `
            -TargetSha "${{ steps.target.outputs.target_sha }}" `
            -TargetRef "${{ steps.target.outputs.target_ref }}" `
            -LockPath "$env:WINDOWS_DEPLOY_LOCK_PATH" `
            -OutputPath "$deployResultPath" `
            -DiagnosticsPath "$deployDiagnosticsPath" `
            -DiagnosticsLogsPath "$deployLogsPath"
          $exitCode = $LASTEXITCODE

          if (Test-Path $deployResultPath) {
            $deployResult = Get-Content $deployResultPath -Raw | ConvertFrom-Json
            "deployed_sha=$($deployResult.deployed_sha)" >> $env:GITHUB_OUTPUT
            "previous_sha=$($deployResult.previous_sha)" >> $env:GITHUB_OUTPUT
          } else {
            "deployed_sha=" >> $env:GITHUB_OUTPUT
            "previous_sha=" >> $env:GITHUB_OUTPUT
          }

          if ($exitCode -ne 0) {
            exit $exitCode
          }

      - name: Align Qdrant collection dimensions
        id: qdrant_migration
        if: ${{ steps.deploy.outcome == 'success' }}
        shell: pwsh
        continue-on-error: true
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $migrationResultPath = Join-Path $PWD "qdrant-migration.json"
          & ./scripts/windows/migrate-qdrant-embeddings.ps1 `
            -DeployPath "$env:WINDOWS_DEPLOY_PATH" `
            -OutputPath "$migrationResultPath"
          $exitCode = $LASTEXITCODE

          $qdrantAligned = $false
          if (Test-Path $migrationResultPath) {
            $migration = Get-Content $migrationResultPath -Raw | ConvertFrom-Json
            $migrationStatus = [string]$migration.status
            $qdrantAligned = $migrationStatus -in @('aligned', 'migrated')
            "migration_status=$migrationStatus" >> $env:GITHUB_OUTPUT
            "qdrant_dimensions_aligned=$qdrantAligned" >> $env:GITHUB_OUTPUT
          } else {
            "migration_status=missing_output" >> $env:GITHUB_OUTPUT
            "qdrant_dimensions_aligned=false" >> $env:GITHUB_OUTPUT
          }

          if ($exitCode -ne 0) {
            exit $exitCode
          }

          if (-not $qdrantAligned) {
            throw "Qdrant migration did not report aligned or migrated status."
          }

      - name: Verify runtime health and behavior
        id: verify
        if: ${{ steps.deploy.outcome == 'success' && steps.qdrant_migration.outcome == 'success' }}
        shell: pwsh
        continue-on-error: true
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $verifyResultPath = Join-Path $PWD "verify-result.json"
          $exitCode = 0

          & ./scripts/windows/verify-runtime.ps1 `
            -DeployPath "$env:WINDOWS_DEPLOY_PATH" `
            -OutputPath "$verifyResultPath"
          $exitCode = $LASTEXITCODE

          if (Test-Path $verifyResultPath) {
            $verifyResult = Get-Content $verifyResultPath -Raw | ConvertFrom-Json
            $checks = $verifyResult.checks
            "containers_healthy=$($checks.containers_healthy)" >> $env:GITHUB_OUTPUT
            "bot_startup_markers=$($checks.bot_startup_markers)" >> $env:GITHUB_OUTPUT
            "postgres_model_keys=$($checks.postgres_model_keys)" >> $env:GITHUB_OUTPUT
            "fallback_probe=$($checks.fallback_probe)" >> $env:GITHUB_OUTPUT
          } else {
            "containers_healthy=false" >> $env:GITHUB_OUTPUT
            "bot_startup_markers=false" >> $env:GITHUB_OUTPUT
            "postgres_model_keys=false" >> $env:GITHUB_OUTPUT
            "fallback_probe=false" >> $env:GITHUB_OUTPUT
          }

          if ($exitCode -ne 0) {
            exit $exitCode
          }

      - name: Roll back to last known good SHA
        id: rollback
        if: ${{ steps.deploy.outcome == 'failure' || steps.qdrant_migration.outcome == 'failure' || steps.verify.outcome == 'failure' }}
        shell: pwsh
        continue-on-error: true
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $rollbackResultPath = Join-Path $PWD "rollback-result.json"
          & ./scripts/windows/rollback-last-good.ps1 `
            -DeployPath "$env:WINDOWS_DEPLOY_PATH" `
            -LastGoodShaPath "$env:WINDOWS_LAST_GOOD_SHA_PATH" `
            -LockPath "$env:WINDOWS_DEPLOY_LOCK_PATH" `
            -OutputPath "$rollbackResultPath"

      - name: Build deployment receipt
        id: receipt
        if: always()
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $verifyResultPath = Join-Path $PWD "verify-result.json"
          if (Test-Path $verifyResultPath) {
            $verify = Get-Content $verifyResultPath -Raw | ConvertFrom-Json
          } else {
            $verify = [pscustomobject]@{
              checks = [pscustomobject]@{
                qdrant_dimensions_aligned = $false
                containers_healthy = $false
                bot_startup_markers = $false
                postgres_model_keys = $false
                fallback_probe = $false
              }
            }
          }

          $qdrantAligned = "${{ steps.qdrant_migration.outputs.qdrant_dimensions_aligned }}" -eq "True"
          if ("${{ steps.qdrant_migration.outputs.qdrant_dimensions_aligned }}" -eq "true") {
            $qdrantAligned = $true
          }

          $resilienceChecks = [pscustomobject]@{
            recovery_tasks_registered = "${{ steps.resilience.outputs.recovery_tasks_registered }}" -eq "true"
            promotions_task_registered = "${{ steps.resilience.outputs.promotions_task_registered }}" -eq "true"
            runner_service_persistent = "${{ steps.resilience.outputs.runner_service_persistent }}" -eq "true"
            docker_service_persistent = "${{ steps.resilience.outputs.docker_service_persistent }}" -eq "true"
          }

          $status = "success"
          if (
            "${{ steps.deploy.outcome }}" -eq "failure" -or
            "${{ steps.qdrant_migration.outcome }}" -eq "failure" -or
            "${{ steps.verify.outcome }}" -eq "failure"
          ) {
            if ("${{ steps.rollback.outcome }}" -eq "success") {
              $status = "rolled_back"
            } else {
              $status = "failed"
            }
          }

          $receipt = [ordered]@{
            target_sha = "${{ steps.target.outputs.target_sha }}"
            deployed_sha = "${{ steps.deploy.outputs.deployed_sha }}"
            ref = "${{ steps.target.outputs.target_ref }}"
            deployed_at = [DateTime]::UtcNow.ToString("o")
            workflow_run_id = "${{ steps.target.outputs.source_workflow_run_id }}"
            checks = [ordered]@{
              qdrant_dimensions_aligned = [bool]$qdrantAligned
              containers_healthy = [bool]$verify.checks.containers_healthy
              bot_startup_markers = [bool]$verify.checks.bot_startup_markers
              postgres_model_keys = [bool]$verify.checks.postgres_model_keys
              fallback_probe = [bool]$verify.checks.fallback_probe
              recovery_tasks_registered = [bool]$resilienceChecks.recovery_tasks_registered
              promotions_task_registered = [bool]$resilienceChecks.promotions_task_registered
              runner_service_persistent = [bool]$resilienceChecks.runner_service_persistent
              docker_service_persistent = [bool]$resilienceChecks.docker_service_persistent
            }
            status = $status
          }

          $receiptPath = Join-Path $PWD "deployment-receipt.json"
          $receipt | ConvertTo-Json -Depth 8 | Out-File $receiptPath -Encoding utf8
          $localReceiptDir = "$env:WINDOWS_DEPLOYMENT_RECEIPTS_PATH"
          if (-not (Test-Path $localReceiptDir)) {
            New-Item -ItemType Directory -Path $localReceiptDir -Force | Out-Null
          }
          $receiptSha = if ($receipt.target_sha) { [string]$receipt.target_sha } else { [string]$receipt.deployed_sha }
          if (-not $receiptSha) {
            $receiptSha = "${{ steps.target.outputs.target_sha }}"
          }
          $localReceiptPath = Join-Path $localReceiptDir "$receiptSha.json"
          $receipt | ConvertTo-Json -Depth 8 | Out-File $localReceiptPath -Encoding utf8
          "receipt_path=$receiptPath" >> $env:GITHUB_OUTPUT
          "local_receipt_path=$localReceiptPath" >> $env:GITHUB_OUTPUT

      - name: Persist last known good SHA
        if: ${{ steps.receipt.outcome == 'success' }}
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $receipt = Get-Content "${{ steps.receipt.outputs.receipt_path }}" -Raw | ConvertFrom-Json
          if ($receipt.status -eq "success" -and $receipt.deployed_sha) {
            $parent = Split-Path -Parent "$env:WINDOWS_LAST_GOOD_SHA_PATH"
            if (-not (Test-Path $parent)) {
              New-Item -ItemType Directory -Path $parent -Force | Out-Null
            }
            Set-Content -Path "$env:WINDOWS_LAST_GOOD_SHA_PATH" -Value "$($receipt.deployed_sha)`n" -Encoding utf8
          }

      - name: Trigger local post-deploy promotions runner
        id: promotions
        if: ${{ steps.receipt.outcome == 'success' }}
        shell: pwsh
        continue-on-error: true
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $receiptPath = "${{ steps.receipt.outputs.local_receipt_path }}"
          if (-not $receiptPath -or -not (Test-Path $receiptPath)) {
            throw "Local deployment receipt not found: $receiptPath"
          }

          $receipt = Get-Content $receiptPath -Raw | ConvertFrom-Json
          if ($receipt.status -ne "success") {
            "promotions_status=skipped_non_success_receipt" >> $env:GITHUB_OUTPUT
            "promotions_exit_code=0" >> $env:GITHUB_OUTPUT
            exit 0
          }

          $promotionsResultPath = Join-Path $PWD "promotions-run-result.json"
          & ./scripts/windows/promotions-runner.ps1 `
            -Sha "${{ steps.target.outputs.target_sha }}" `
            -ReceiptPath "$receiptPath" `
            -DeployPath "$env:WINDOWS_DEPLOY_PATH" `
            -RunUrl "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" `
            -OutputPath "$promotionsResultPath"
          $exitCode = $LASTEXITCODE

          "promotions_exit_code=$exitCode" >> $env:GITHUB_OUTPUT
          if (Test-Path $promotionsResultPath) {
            "promotions_result_path=$promotionsResultPath" >> $env:GITHUB_OUTPUT
          }

          if ($exitCode -eq 0) {
            "promotions_status=success" >> $env:GITHUB_OUTPUT
          } else {
            "promotions_status=deferred" >> $env:GITHUB_OUTPUT
          }
          exit 0

      - name: Upload deployment receipt artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: deployment-receipt
          path: ${{ steps.receipt.outputs.receipt_path }}
          retention-days: 30

      - name: Upload deploy diagnostics artifacts
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: deploy-windows-diagnostics
          path: |
            resilience-registration.json
            resilience-ready.json
            deploy-result.json
            deploy-container-diagnostics.json
            deploy-container-logs.txt
            qdrant-migration.json
            verify-result.json
            rollback-result.json
            promotions-run-result.json
            announcement-flush-result.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Warn when promotions task is missing
        if: ${{ always() && steps.receipt.outcome == 'success' }}
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $receipt = Get-Content "${{ steps.receipt.outputs.receipt_path }}" -Raw | ConvertFrom-Json
          if ($receipt.checks.promotions_task_registered) {
            exit 0
          }

          $requireRaw = [string]$env:WINDOWS_REQUIRE_PROMOTIONS_TASK
          $requirePromotionsTask = $false
          if ($requireRaw) {
            $normalized = $requireRaw.Trim().ToLowerInvariant()
            $requirePromotionsTask = @("1", "true", "yes", "on") -contains $normalized
          }

          $modeText = if ($requirePromotionsTask) { "blocking" } else { "warning_only" }
          $warningMessage = "promotions_task_registered=false (mode=$modeText, env WINDOWS_REQUIRE_PROMOTIONS_TASK=$requireRaw)"
          Write-Warning $warningMessage

          $registrationStatus = "${{ steps.resilience_register.outputs.registration_status }}"
          $registrationFailureCode = "${{ steps.resilience_register.outputs.failure_code }}"
          $registrationBootstrapRequired = "${{ steps.resilience_register.outputs.bootstrap_required }}"

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Promotions Task Warning"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- promotions_task_registered: false"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- mode: $modeText"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- WINDOWS_REQUIRE_PROMOTIONS_TASK: $requireRaw"
          if ($registrationStatus) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- resilience_registration_status: $registrationStatus"
          }
          if ($registrationFailureCode) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- resilience_registration_failure_code: $registrationFailureCode"
          }
          if ($registrationBootstrapRequired) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- resilience_registration_bootstrap_required: $registrationBootstrapRequired"
          }

      - name: Enforce receipt success gate
        if: always()
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $receipt = Get-Content "${{ steps.receipt.outputs.receipt_path }}" -Raw | ConvertFrom-Json
          if ($receipt.status -ne "success") {
            throw "Deployment receipt status is '$($receipt.status)' (expected 'success')."
          }
          if (-not $receipt.target_sha -or -not $receipt.deployed_sha) {
            throw "Receipt is missing target/deployed SHA."
          }
          if ($receipt.target_sha -ne $receipt.deployed_sha) {
            throw "Receipt SHA mismatch: target=$($receipt.target_sha) deployed=$($receipt.deployed_sha)."
          }

          $checks = $receipt.checks
          if (-not $checks.qdrant_dimensions_aligned) { throw "Receipt check failed: qdrant_dimensions_aligned" }
          if (-not $checks.containers_healthy) { throw "Receipt check failed: containers_healthy" }
          if (-not $checks.bot_startup_markers) { throw "Receipt check failed: bot_startup_markers" }
          if (-not $checks.postgres_model_keys) { throw "Receipt check failed: postgres_model_keys" }
          if (-not $checks.fallback_probe) { throw "Receipt check failed: fallback_probe" }
          if (-not $checks.recovery_tasks_registered) { throw "Receipt check failed: recovery_tasks_registered" }
          if (-not $checks.runner_service_persistent) { throw "Receipt check failed: runner_service_persistent" }
          if (-not $checks.docker_service_persistent) { throw "Receipt check failed: docker_service_persistent" }

          $requireRaw = [string]$env:WINDOWS_REQUIRE_PROMOTIONS_TASK
          $requirePromotionsTask = $false
          if ($requireRaw) {
            $normalized = $requireRaw.Trim().ToLowerInvariant()
            $requirePromotionsTask = @("1", "true", "yes", "on") -contains $normalized
          }
          if ($requirePromotionsTask -and -not $checks.promotions_task_registered) {
            throw "Receipt check failed: promotions_task_registered (WINDOWS_REQUIRE_PROMOTIONS_TASK=$requireRaw)."
          }

      - name: Emit deploy completion announcement
        if: always()
        shell: pwsh
        continue-on-error: true
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = "Stop"

          $notifyScript = Join-Path $PWD "scripts\windows\announcement-emit.py"
          if (-not (Test-Path $notifyScript)) {
            Write-Host "Announcement emitter script not found; skipping notification."
            exit 0
          }

          $pythonExe = if (Get-Command python -ErrorAction SilentlyContinue) { "python" } else { "python3" }
          $deployStatus = "${{ job.status }}"
          if (-not $deployStatus) {
            $deployStatus = "unknown"
          }

          $runUrl = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $stageDetails = "deploy=${{ steps.deploy.outcome }};verify=${{ steps.verify.outcome }};receipt=${{ steps.receipt.outcome }};promotions=${{ steps.promotions.outputs.promotions_status }}"

          & $pythonExe $notifyScript `
            --event deploy `
            --sha "${{ steps.target.outputs.target_sha }}" `
            --status "$deployStatus" `
            --run-url "$runUrl" `
            --stage-results "$stageDetails" | Out-Null

          $flushScript = Join-Path $PWD "scripts\windows\announcements-flush.ps1"
          if (Test-Path $flushScript) {
            $flushOutputPath = Join-Path $PWD "announcement-flush-result.json"
            & pwsh -NoProfile -ExecutionPolicy Bypass -File $flushScript `
              -DeployPath "$env:WINDOWS_DEPLOY_PATH" `
              -OutputPath "$flushOutputPath" | Out-Null
          }
