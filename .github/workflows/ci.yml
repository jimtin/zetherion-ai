name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "30 2 * * 0"
  workflow_dispatch:  # Allow manual triggering
  workflow_call:  # Allow reuse by release.yml

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
      code: ${{ steps.filter.outputs.code }}
      integration: ${{ steps.filter.outputs.integration }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'README.md'
              - 'mkdocs.yml'
            code:
              - 'src/**'
              - 'tests/**'
              - 'updater_sidecar/**'
              - 'requirements*.txt'
              - 'pyproject.toml'
            integration:
              - 'src/**'
              - 'updater_sidecar/**'
              - 'tests/integration/**'
              - 'docker-compose*.yml'
              - 'Dockerfile*'
              - 'requirements*.txt'
              - 'pyproject.toml'
            docker:
              - 'docker-compose*.yml'
              - 'Dockerfile*'
              - '.dockerignore'

  # ============================================================================
  # Code Quality Jobs
  # ============================================================================
  risk-classifier:
    name: Risk Classifier
    runs-on: ubuntu-latest
    needs: [detect-changes]
    permissions:
      contents: read
      pull-requests: read
    outputs:
      e2e_required: ${{ steps.classify.outputs.e2e_required }}
      decision_reason_code: ${{ steps.classify.outputs.decision_reason_code }}
      decision_reason: ${{ steps.classify.outputs.decision_reason }}
      changed_files_count: ${{ steps.classify.outputs.changed_files_count }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Classify required E2E risk
        id: classify
        run: |
          python scripts/ci_e2e_risk_classifier.py \
            --event-name "${{ github.event_name }}" \
            --base-ref "${{ github.base_ref }}" \
            --before-sha "${{ github.event.before }}" \
            --head-sha "${{ github.sha }}" \
            --output e2e-risk-classifier-receipt.json \
            --github-output "$GITHUB_OUTPUT"

      - name: Upload risk classifier receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: e2e-risk-classifier
          path: e2e-risk-classifier-receipt.json
          retention-days: 30

  lint:
    name: Linting & Formatting
    runs-on: ubuntu-latest
    needs: [detect-changes]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.4

      - name: Run Ruff linter
        run: ruff check src/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/

  type-check:
    name: Type Checking
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && needs.detect-changes.outputs.code == 'true') }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install mypy types-requests

      - name: Run mypy
        run: mypy src/zetherion_ai --config-file=pyproject.toml

  # ============================================================================
  # Security Scanning Jobs
  # ============================================================================
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && needs.detect-changes.outputs.code == 'true') }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run Bandit security scan
        run: bandit -r src/ -c pyproject.toml

  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Run Semgrep
        run: |
          pip install semgrep
          semgrep scan --config auto --sarif --output semgrep.sarif src/ || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@45cbd0c69e560cd9e7cd7f8c32362050c9b7ded2  # v3
        if: always()
        with:
          sarif_file: semgrep.sarif

  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VERSION=8.24.3
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Fetch PR base ref
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch origin "${{ github.base_ref }}" --depth=1

      - name: Run diff secret scan (PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          gitleaks git \
            --redact \
            --exit-code 1 \
            --log-opts="origin/${{ github.base_ref }}..${{ github.sha }}"

      - name: Run full history secret scan (weekly/manual)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        run: |
          gitleaks git \
            --redact \
            --exit-code 1 \
            --log-opts="--all"

  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pip-audit
        run: python -m pip install pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt --strict --desc on

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies and pip-licenses
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-licenses

      - name: Check dependency licenses
        run: |
          echo "### Dependency Licenses" >> $GITHUB_STEP_SUMMARY
          pip-licenses --format=markdown >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          pip-licenses \
            --allow-only="MIT License;MIT;BSD License;BSD-2-Clause;BSD-3-Clause;Apache Software License;Apache License 2.0;Apache-2.0;ISC License;ISC;Python Software Foundation License;PSF-2.0;Mozilla Public License 2.0 (MPL 2.0);MPL-2.0;Artistic License;Public Domain;The Unlicense;Unlicense;CC0-1.0;0BSD;Zlib;UNKNOWN" \
            --partial-match

  pre-commit:
    name: Pre-commit Checks
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

  docs-contract:
    name: Documentation Contracts
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && needs.detect-changes.outputs.docs == 'true') }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs-material

      - name: Run docs contract checks
        run: |
          scripts/check-docs-nav.py
          scripts/check-docs-links.py
          scripts/check-route-doc-parity.py
          scripts/check-cgs-route-doc-parity.py
          scripts/check-env-doc-parity.py

      - name: Build docs (strict)
        run: mkdocs build --strict

  pipeline-contract:
    name: Pipeline Contract
    runs-on: ubuntu-latest
    needs: [detect-changes]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Validate pipeline contract mapping
        run: |
          python scripts/check_pipeline_contract.py
          python scripts/check-endpoint-doc-bundle.py
          python scripts/check-announcement-dm-guard.py
          python scripts/check-optional-service-guards.py

  zetherion-boundary-check:
    name: Zetherion Boundary Check
    runs-on: ubuntu-latest
    needs: [detect-changes]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Enforce repository boundary (no top-level cgs UI)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            BASE_REF="origin/${{ github.base_ref }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            BASE_REF="${{ github.event.before }}"
          else
            BASE_REF=""
          fi
          if [[ -n "$BASE_REF" ]]; then
            scripts/check-zetherion-boundary.sh "$BASE_REF" "${{ github.sha }}"
          else
            scripts/check-zetherion-boundary.sh
          fi

  # ============================================================================
  # Test Jobs
  # ============================================================================
  unit-test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && needs.detect-changes.outputs.code == 'true') }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON((github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '[{"python-version":"3.12","upload_coverage":true},{"python-version":"3.13","upload_coverage":false}]' || '[{"python-version":"3.12","upload_coverage":true}]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            -m "not integration and not discord_e2e" \
            -v \
            --tb=short \
            --cov=src/zetherion_ai \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-fail-under=90

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        if: matrix.upload_coverage
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-zetherion_ai
          fail_ci_if_error: false

      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: matrix.upload_coverage
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  required-e2e-gate:
    name: Required E2E Gate
    runs-on: ubuntu-latest
    needs: [risk-classifier]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Enforce required E2E contract
        env:
          E2E_REQUIRED: ${{ needs.risk-classifier.outputs.e2e_required }}
          E2E_DECISION_REASON_CODE: ${{ needs.risk-classifier.outputs.decision_reason_code }}
          E2E_DECISION_REASON: ${{ needs.risk-classifier.outputs.decision_reason }}
          E2E_EXPECTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          LOCAL_E2E_RECEIPT_PATH: .ci/e2e-receipt.json
        run: |
          bash scripts/ci-required-e2e-gate.sh

      - name: Upload E2E contract receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: e2e-contract-receipt
          path: |
            e2e-contract-receipt.json
            .ci/e2e-receipt.json
          retention-days: 30

  integration-test:
    name: Integration (${{ matrix.shard.name }})
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: core
            files: >-
              tests/integration/test_skills_http.py
              tests/integration/test_heartbeat_cycle.py
              tests/integration/test_profile_pipeline.py
              tests/integration/test_agent_skills_http.py
              tests/integration/test_skills_e2e.py
              tests/integration/test_user_isolation.py
              tests/integration/test_encryption_at_rest.py
          - name: api-and-ops
            files: >-
              tests/integration/test_health_skill_http.py
              tests/integration/test_update_skill_http.py
              tests/integration/test_telemetry_http.py
              tests/integration/test_api_http.py
          - name: feature-http
            files: >-
              tests/integration/test_dev_watcher_e2e.py
              tests/integration/test_dev_watcher_onboarding_integration.py
              tests/integration/test_milestone_e2e.py
              tests/integration/test_youtube_http.py
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e ".[dev]"

      - name: Run integration shard
        run: |
          pytest ${{ matrix.shard.files }} \
            -m "integration and not optional_e2e" \
            -n 4 \
            --timeout=60 \
            --tb=short \
            --no-cov \
            -q

  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && needs.detect-changes.outputs.docker == 'true') }}
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Prepare compose environment file
        run: |
          if [[ -f .env.example ]]; then
            cp .env.example .env
          else
            : > .env
          fi

      - name: Validate Docker Compose config
        run: docker compose -f docker-compose.yml config > /tmp/compose-config.yaml

      - name: Build Skills image
        run: docker build -f Dockerfile.skills -t zetherion-ai-skills-ci:${{ github.sha }} .

  # ============================================================================
  # Summary Job
  # ============================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      [
        detect-changes,
        risk-classifier,
        lint,
        type-check,
        security,
        semgrep,
        secret-scan,
        dependency-audit,
        license-check,
        pre-commit,
        docs-contract,
        pipeline-contract,
        zetherion-boundary-check,
        unit-test,
        required-e2e-gate,
        integration-test,
        docker-build-test,
      ]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          normalize_optional_result() {
            local result="$1"
            if [[ "$result" == "skipped" ]]; then
              printf 'success\n'
            else
              printf '%s\n' "$result"
            fi
          }

          EVENT_NAME="${{ github.event_name }}"
          DETECT_CHANGES_RESULT="${{ needs.detect-changes.result }}"
          RISK_CLASSIFIER_RESULT="${{ needs.risk-classifier.result }}"
          LINT_RESULT="${{ needs.lint.result }}"
          SECRET_SCAN_RESULT="$(normalize_optional_result "${{ needs.secret-scan.result }}")"
          PIPELINE_CONTRACT_RESULT="${{ needs.pipeline-contract.result }}"
          BOUNDARY_RESULT="$(normalize_optional_result "${{ needs.zetherion-boundary-check.result }}")"
          REQUIRED_E2E_GATE_RESULT="${{ needs.required-e2e-gate.result }}"

          TYPE_CHECK_RESULT="$(normalize_optional_result "${{ needs.type-check.result }}")"
          SECURITY_RESULT="$(normalize_optional_result "${{ needs.security.result }}")"
          SEMGREP_RESULT="$(normalize_optional_result "${{ needs.semgrep.result }}")"
          DEPENDENCY_AUDIT_RESULT="$(normalize_optional_result "${{ needs.dependency-audit.result }}")"
          LICENSE_RESULT="$(normalize_optional_result "${{ needs.license-check.result }}")"
          PRE_COMMIT_RESULT="$(normalize_optional_result "${{ needs.pre-commit.result }}")"
          DOCS_RESULT="$(normalize_optional_result "${{ needs.docs-contract.result }}")"
          UNIT_RESULT="$(normalize_optional_result "${{ needs.unit-test.result }}")"
          INTEGRATION_RESULT="$(normalize_optional_result "${{ needs.integration-test.result }}")"
          DOCKER_BUILD_RESULT="$(normalize_optional_result "${{ needs.docker-build-test.result }}")"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$DETECT_CHANGES_RESULT" == "success" ]] && \
               [[ "$RISK_CLASSIFIER_RESULT" == "success" ]] && \
               [[ "$LINT_RESULT" == "success" ]] && \
               [[ "$SECRET_SCAN_RESULT" == "success" ]] && \
               [[ "$PIPELINE_CONTRACT_RESULT" == "success" ]] && \
               [[ "$BOUNDARY_RESULT" == "success" ]] && \
               [[ "$REQUIRED_E2E_GATE_RESULT" == "success" ]]; then
              echo "✅ PR fast-path checks passed!"
              exit 0
            else
              echo "❌ PR fast-path checks failed:"
              echo "  Detect Changes: ${DETECT_CHANGES_RESULT}"
              echo "  Risk Classifier: ${RISK_CLASSIFIER_RESULT} (raw=${{ needs.risk-classifier.result }})"
              echo "  Lint: ${LINT_RESULT}"
              echo "  Secret Scan (Gitleaks): ${SECRET_SCAN_RESULT} (raw=${{ needs.secret-scan.result }})"
              echo "  Pipeline Contract: ${PIPELINE_CONTRACT_RESULT}"
              echo "  Zetherion Boundary: ${BOUNDARY_RESULT} (raw=${{ needs.zetherion-boundary-check.result }})"
              echo "  Required E2E Gate: ${REQUIRED_E2E_GATE_RESULT} (raw=${{ needs.required-e2e-gate.result }})"
              exit 1
            fi
          fi

          if [[ "$DETECT_CHANGES_RESULT" == "success" ]] && \
             [[ "$LINT_RESULT" == "success" ]] && \
             [[ "$RISK_CLASSIFIER_RESULT" == "success" ]] && \
             [[ "$TYPE_CHECK_RESULT" == "success" ]] && \
             [[ "$SECURITY_RESULT" == "success" ]] && \
             [[ "$SEMGREP_RESULT" == "success" ]] && \
             [[ "$SECRET_SCAN_RESULT" == "success" ]] && \
             [[ "$DEPENDENCY_AUDIT_RESULT" == "success" ]] && \
             [[ "$LICENSE_RESULT" == "success" ]] && \
             [[ "$PRE_COMMIT_RESULT" == "success" ]] && \
             [[ "$DOCS_RESULT" == "success" ]] && \
             [[ "$PIPELINE_CONTRACT_RESULT" == "success" ]] && \
             [[ "$BOUNDARY_RESULT" == "success" ]] && \
             [[ "$UNIT_RESULT" == "success" ]] && \
             [[ "$REQUIRED_E2E_GATE_RESULT" == "success" ]] && \
             [[ "$INTEGRATION_RESULT" == "success" ]] && \
             [[ "$DOCKER_BUILD_RESULT" == "success" ]]; then
            echo "✅ All CI checks passed!"
            exit 0
          else
            echo "❌ Some CI checks failed:"
            echo "  Detect Changes: ${DETECT_CHANGES_RESULT}"
            echo "  Lint: ${LINT_RESULT}"
            echo "  Risk Classifier: ${RISK_CLASSIFIER_RESULT} (raw=${{ needs.risk-classifier.result }})"
            echo "  Type Check: ${TYPE_CHECK_RESULT} (raw=${{ needs.type-check.result }})"
            echo "  Security (Bandit): ${SECURITY_RESULT} (raw=${{ needs.security.result }})"
            echo "  SAST (Semgrep): ${SEMGREP_RESULT} (raw=${{ needs.semgrep.result }})"
            echo "  Secret Scan (Gitleaks): ${SECRET_SCAN_RESULT} (raw=${{ needs.secret-scan.result }})"
            echo "  Dependency Audit: ${DEPENDENCY_AUDIT_RESULT} (raw=${{ needs.dependency-audit.result }})"
            echo "  License Check: ${LICENSE_RESULT} (raw=${{ needs.license-check.result }})"
            echo "  Pre-commit: ${PRE_COMMIT_RESULT} (raw=${{ needs.pre-commit.result }})"
            echo "  Docs Contracts: ${DOCS_RESULT} (raw=${{ needs.docs-contract.result }})"
            echo "  Pipeline Contract: ${PIPELINE_CONTRACT_RESULT}"
            echo "  Zetherion Boundary: ${BOUNDARY_RESULT} (raw=${{ needs.zetherion-boundary-check.result }})"
            echo "  Unit Tests: ${UNIT_RESULT} (raw=${{ needs.unit-test.result }})"
            echo "  Required E2E Gate: ${REQUIRED_E2E_GATE_RESULT} (raw=${{ needs.required-e2e-gate.result }})"
            echo "  Integration Tests: ${INTEGRATION_RESULT} (raw=${{ needs.integration-test.result }})"
            echo "  Docker Build Test: ${DOCKER_BUILD_RESULT} (raw=${{ needs.docker-build-test.result }})"
            exit 1
          fi

      - name: Post summary
        if: always()
        run: |
          EVENT_NAME="${{ github.event_name }}"
          echo "### CI Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "#### PR Fast Path" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Detect Changes | ${{ needs.detect-changes.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Risk Classifier | ${{ needs.risk-classifier.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Linting | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Secret Scan (Gitleaks) | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Pipeline Contract | ${{ needs.pipeline-contract.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Zetherion Boundary | ${{ needs.zetherion-boundary-check.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Required E2E Gate | ${{ needs.required-e2e-gate.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Deferred off PR fast path: Type Checking, Security (Bandit), Docs Contracts, Unit Tests, Docker Build Test, Semgrep, Dependency Audit, License Check, Pre-commit, and Integration Tests." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Detect Changes | ${{ needs.detect-changes.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linting | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Risk Classifier | ${{ needs.risk-classifier.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type Checking | ${{ needs.type-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security (Bandit) | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST (Semgrep) | ${{ needs.semgrep.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan (Gitleaks) | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Check | ${{ needs.license-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pre-commit | ${{ needs.pre-commit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docs Contracts | ${{ needs.docs-contract.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Pipeline Contract | ${{ needs.pipeline-contract.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Zetherion Boundary | ${{ needs.zetherion-boundary-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Required E2E Gate | ${{ needs.required-e2e-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build Test | ${{ needs.docker-build-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Security Scanning**: Semgrep (SAST), Bandit (Python), pip-audit (dependencies)" >> $GITHUB_STEP_SUMMARY

  failure-attribution:
    name: CI Failure Attribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      [
        detect-changes,
        risk-classifier,
        lint,
        type-check,
        security,
        semgrep,
        secret-scan,
        dependency-audit,
        license-check,
        pre-commit,
        docs-contract,
        pipeline-contract,
        zetherion-boundary-check,
        unit-test,
        required-e2e-gate,
        integration-test,
        docker-build-test,
      ]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Attribute local-vs-CI failure causes
        run: |
          python scripts/ci_failure_attribution.py \
            --output ci-failure-attribution.json \
            --job-results "detect-changes=${{ needs.detect-changes.result }},risk-classifier=${{ needs.risk-classifier.result }},lint=${{ needs.lint.result }},type-check=${{ needs.type-check.result }},security=${{ needs.security.result }},semgrep=${{ needs.semgrep.result }},secret-scan=${{ needs.secret-scan.result }},dependency-audit=${{ needs.dependency-audit.result }},license-check=${{ needs.license-check.result }},pre-commit=${{ needs.pre-commit.result }},docs-contract=${{ needs.docs-contract.result }},pipeline-contract=${{ needs.pipeline-contract.result }},zetherion-boundary-check=${{ needs.zetherion-boundary-check.result }},unit-test=${{ needs.unit-test.result }},required-e2e-gate=${{ needs.required-e2e-gate.result }},integration-test=${{ needs.integration-test.result }},docker-build-test=${{ needs.docker-build-test.result }}"

      - name: Upload attribution artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: ci-failure-attribution
          path: ci-failure-attribution.json
          retention-days: 30
