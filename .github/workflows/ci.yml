name: Owner CI Bridge

on:
  workflow_dispatch:
    inputs:
      sha:
        description: Certified commit SHA
        required: false
        type: string
      ref:
        description: Ref associated with the receipt
        required: false
        default: refs/heads/main
        type: string

permissions:
  contents: read

jobs:
  bridge:
    name: Owner CI Bridge
    runs-on: ubuntu-latest
    steps:
      - name: Summarize owner-controlled CI policy
        shell: bash
        run: |
          {
            echo "### Owner CI Bridge"
            echo ""
            echo "GitHub Actions is not the CI authority for this repository."
            echo "Local proof and Zetherion readiness receipts control merge and deploy decisions."
            echo ""
            echo "- merge status context: \`zetherion/merge-readiness\`"
            echo "- deploy status context: \`zetherion/deploy-readiness\`"
            echo "- local heavy gate: \`./scripts/test-full.sh\`"
            if [[ -n "${{ inputs.sha }}" ]]; then
              echo "- certified sha: \`${{ inputs.sha }}\`"
            fi
            if [[ -n "${{ inputs.ref }}" ]]; then
              echo "- ref: \`${{ inputs.ref }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
