openapi: 3.1.0
info:
  title: CGS AI Gateway API
  version: 1.0.0
  description: Public CGS `/service/ai/v1` contract mapped to internal Zetherion upstream APIs.
  x-maintenance-note: "2026-03-04: Zetherion-only boundary recovery removed in-repo CGS website/UI assets; CGS gateway API contract unchanged."
servers:
  - url: https://{host}
    variables:
      host:
        default: cgs-api.example.com
security:
  - CgsBearerAuth: []
paths:
  /service/ai/v1/health:
    get:
      summary: Gateway health check
      security: []
      responses:
        '200':
          description: Healthy service status
  /service/ai/v1/conversations:
    post:
      summary: Create conversation mapped to Zetherion session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeConversationCreated'
  /service/ai/v1/conversations/{conversation_id}:
    get:
      summary: Get conversation metadata
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Conversation metadata
    delete:
      summary: Close conversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Conversation closed
  /service/ai/v1/conversations/{conversation_id}/messages:
    post:
      summary: Send message via mapped conversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Assistant response envelope
    get:
      summary: Get conversation messages
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Message history envelope
  /service/ai/v1/conversations/{conversation_id}/messages/stream:
    post:
      summary: Stream message response (SSE passthrough)
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: SSE stream
  /service/ai/v1/conversations/{conversation_id}/analytics/events:
    post:
      summary: Proxy analytics events
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Accepted
  /service/ai/v1/conversations/{conversation_id}/analytics/replay/chunks:
    post:
      summary: Proxy replay chunk upload
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Accepted
  /service/ai/v1/conversations/{conversation_id}/analytics/replay/chunks/{web_session_id}/{sequence_no}:
    get:
      summary: Proxy replay chunk retrieval
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - name: web_session_id
          in: path
          required: true
          schema:
            type: string
        - name: sequence_no
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Replay chunk metadata/data envelope
  /service/ai/v1/conversations/{conversation_id}/analytics/end:
    post:
      summary: End analytics session
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Session closed
  /service/ai/v1/conversations/{conversation_id}/recommendations:
    get:
      summary: Get recommendation candidates
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: Recommendation list
  /service/ai/v1/conversations/{conversation_id}/recommendations/{recommendation_id}/feedback:
    post:
      summary: Send recommendation feedback
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - name: recommendation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Feedback accepted

  /service/ai/v1/documents/uploads:
    post:
      summary: Create tenant-scoped document upload intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUploadRequest'
      responses:
        '201':
          description: Upload created
  /service/ai/v1/documents/uploads/{upload_id}/complete:
    post:
      summary: Complete tenant document upload
      parameters:
        - $ref: '#/components/parameters/UploadId'
        - name: tenant_id
          in: query
          required: false
          description: Required when request body is multipart/form-data.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUploadCompleteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DocumentUploadCompleteMultipartRequest'
      responses:
        '201':
          description: Document created and indexed
  /service/ai/v1/documents:
    get:
      summary: List tenant documents
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant document list envelope
  /service/ai/v1/documents/{document_id}:
    get:
      summary: Get one tenant document metadata record
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Tenant document envelope
  /service/ai/v1/documents/{document_id}/preview:
    get:
      summary: Proxy inline document preview
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Raw preview bytes streamed with upstream content headers
  /service/ai/v1/documents/{document_id}/download:
    get:
      summary: Proxy document download
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Raw document bytes streamed with upstream content headers
  /service/ai/v1/documents/{document_id}/index:
    post:
      summary: Trigger tenant document re-index
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentReindexRequest'
      responses:
        '200':
          description: Updated document envelope
  /service/ai/v1/rag/query:
    post:
      summary: Query tenant document vectors with provider/model override
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentQueryRequest'
      responses:
        '200':
          description: RAG result envelope
  /service/ai/v1/models/providers:
    get:
      summary: Get provider/model catalog for tenant UI selectors
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Provider catalog envelope
  /service/ai/v1/internal/blog/publish:
    post:
      summary: Receive Windows promotions blog publish receipts
      security: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
            description: Bearer blog publish token
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            pattern: '^blog-[A-Fa-f0-9]{7,64}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlogPublishRequest'
      responses:
        '201':
          description: Publish receipt recorded
        '409':
          description: Duplicate publish receipt (treated as success)
  /service/ai/v1/internal/tenants:
    get:
      summary: List internal tenant mappings
      responses:
        '200':
          description: Tenant mapping list envelope
    post:
      summary: Create or map tenant from internal lifecycle flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTenantRequest'
      responses:
        '201':
          description: Tenant mapping created
  /service/ai/v1/internal/tenants/{tenant_id}:
    patch:
      summary: Update tenant profile/configuration
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigureTenantRequest'
      responses:
        '200':
          description: Tenant mapping updated
  /service/ai/v1/internal/tenants/{tenant_id}/deactivate:
    post:
      summary: Deactivate internal tenant mapping
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant mapping deactivated
  /service/ai/v1/internal/tenants/{tenant_id}/keys/rotate:
    post:
      summary: Rotate mapped tenant API key
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant API key rotated
  /service/ai/v1/internal/tenants/{tenant_id}/release-markers:
    post:
      summary: Publish release marker with mapped tenant credentials
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReleaseMarkerRequest'
      responses:
        '201':
          description: Release marker created
  /service/ai/v1/tenants/{tenant_id}/crm/contacts:
    get:
      summary: Tenant CRM contacts report
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: CRM contacts envelope
  /service/ai/v1/tenants/{tenant_id}/crm/interactions:
    get:
      summary: Tenant CRM interactions report
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: CRM interactions envelope
  /service/ai/v1/tenants/{tenant_id}/analytics/funnel:
    get:
      summary: Tenant analytics funnel report
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Analytics funnel envelope
  /service/ai/v1/tenants/{tenant_id}/analytics/recommendations:
    get:
      summary: Tenant analytics recommendations report
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Analytics recommendations envelope
  /service/ai/v1/internal/admin/tenants/{tenant_id}/discord-users:
    get:
      summary: List tenant-approved Discord users
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant Discord user list envelope
    post:
      summary: Add or update tenant-approved Discord user
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDiscordUserCreateRequest'
      responses:
        '201':
          description: Tenant Discord user created/updated
  /service/ai/v1/internal/admin/tenants/{tenant_id}/discord-users/{discord_user_id}:
    delete:
      summary: Remove tenant-approved Discord user
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: discord_user_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Tenant Discord user removed
  /service/ai/v1/internal/admin/tenants/{tenant_id}/discord-users/{discord_user_id}/role:
    patch:
      summary: Update tenant Discord user role
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: discord_user_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDiscordRolePatchRequest'
      responses:
        '200':
          description: Tenant Discord role update status
  /service/ai/v1/internal/admin/tenants/{tenant_id}/discord-bindings:
    get:
      summary: List tenant Discord guild/channel bindings
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant Discord binding list envelope
  /service/ai/v1/internal/admin/tenants/{tenant_id}/discord-bindings/guilds/{guild_id}:
    put:
      summary: Upsert tenant guild default binding
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: guild_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminGuildBindingRequest'
      responses:
        '200':
          description: Tenant guild binding upserted
  /service/ai/v1/internal/admin/tenants/{tenant_id}/discord-bindings/channels/{channel_id}:
    put:
      summary: Upsert tenant channel override binding
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: channel_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminChannelBindingRequest'
      responses:
        '200':
          description: Tenant channel binding upserted
    delete:
      summary: Delete tenant channel override binding
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: channel_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Tenant channel binding removed
  /service/ai/v1/internal/admin/tenants/{tenant_id}/settings:
    get:
      summary: List tenant runtime setting overrides
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant settings list envelope
  /service/ai/v1/internal/admin/tenants/{tenant_id}/settings/{namespace}/{key}:
    put:
      summary: Set tenant runtime setting override
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSettingPutRequest'
      responses:
        '200':
          description: Tenant setting updated
    delete:
      summary: Delete tenant runtime setting override
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: namespace
          in: path
          required: true
          schema:
            type: string
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant setting removed
  /service/ai/v1/internal/admin/tenants/{tenant_id}/secrets:
    get:
      summary: List tenant secret metadata
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant secret metadata envelope
  /service/ai/v1/internal/admin/tenants/{tenant_id}/secrets/{name}:
    put:
      summary: Create or rotate tenant secret
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSecretPutRequest'
      responses:
        '200':
          description: Tenant secret write accepted
    delete:
      summary: Delete tenant secret
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant secret delete accepted
  /service/ai/v1/internal/admin/tenants/{tenant_id}/audit:
    get:
      summary: List tenant admin audit entries
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant admin audit envelope
  /service/ai/v1/internal/admin/tenants/{tenant_id}/email/providers/{provider}/oauth-app:
    get:
      summary: Get tenant email provider OAuth app metadata
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OAuth app metadata envelope
    put:
      summary: Configure tenant email provider OAuth app
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: provider
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminEmailOAuthAppPutRequest'
      responses:
        '200':
          description: OAuth app config updated
  /service/ai/v1/internal/admin/tenants/{tenant_id}/email/mailboxes/connect/start:
    post:
      summary: Start mailbox connect OAuth flow
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminMailboxConnectStartRequest'
      responses:
        '201':
          description: Mailbox connect started
  /service/ai/v1/internal/admin/tenants/{tenant_id}/email/mailboxes/connect/callback:
    get:
      summary: Exchange mailbox OAuth callback code
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: provider
          in: query
          required: false
          schema:
            type: string
            default: google
      responses:
        '200':
          description: Mailbox link established
  /service/ai/v1/internal/admin/tenants/{tenant_id}/email/mailboxes:
    get:
      summary: List tenant mailboxes
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: provider
          in: query
          required: false
          schema:
            type: string
            default: google
      responses:
        '200':
          description: Mailbox list envelope
  /service/ai/v1/internal/admin/tenants/{tenant_id}/email/mailboxes/{mailbox_id}:
    patch:
      summary: Patch mailbox metadata/status
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: mailbox_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminMailboxPatchRequest'
      responses:
        '200':
          description: Mailbox updated
    delete:
      summary: Delete tenant mailbox
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: mailbox_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Mailbox deleted
  /service/ai/v1/internal/admin/tenants/{tenant_id}/email/mailboxes/{mailbox_id}/sync:
    post:
      summary: Trigger mailbox sync
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: mailbox_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminMailboxSyncRequest'
      responses:
        '200':
          description: Mailbox sync accepted
  /service/ai/v1/internal/admin/tenants/{tenant_id}/email/critical/messages:
    get:
      summary: List critical tenant email messages
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, resolved, dismissed]
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum: [critical, high, normal]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Critical message list envelope
  /service/ai/v1/internal/admin/tenants/{tenant_id}/email/calendars:
    get:
      summary: List calendars for mailbox
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: mailbox_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Calendar list envelope
  /service/ai/v1/internal/admin/tenants/{tenant_id}/email/mailboxes/{mailbox_id}/calendar-primary:
    put:
      summary: Set mailbox primary calendar
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: mailbox_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminMailboxSetPrimaryCalendarRequest'
      responses:
        '200':
          description: Mailbox primary calendar updated
  /service/ai/v1/internal/admin/tenants/{tenant_id}/email/insights:
    get:
      summary: List tenant email insights
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: insight_type
          in: query
          required: false
          schema:
            type: string
        - name: min_confidence
          in: query
          required: false
          schema:
            type: number
            minimum: 0
            maximum: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Email insights envelope
  /service/ai/v1/internal/admin/tenants/{tenant_id}/email/insights/reindex:
    post:
      summary: Reindex tenant email insights
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminInsightsReindexRequest'
      responses:
        '200':
          description: Email insight reindex accepted
  /service/ai/v1/internal/admin/tenants/{tenant_id}/changes:
    post:
      summary: Submit a pending admin change for review
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminChangeCreateRequest'
      responses:
        '201':
          description: Pending admin change created
    get:
      summary: List pending/approved/applied admin changes for tenant
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant admin change list envelope
  /service/ai/v1/internal/admin/tenants/{tenant_id}/changes/{change_id}/approve:
    post:
      summary: Approve a pending admin change (two-person rule)
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: change_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminChangeDecisionRequest'
      responses:
        '200':
          description: Admin change approved
  /service/ai/v1/internal/admin/tenants/{tenant_id}/changes/{change_id}/reject:
    post:
      summary: Reject a pending admin change
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: change_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminChangeDecisionRequest'
      responses:
        '200':
          description: Admin change rejected

components:
  securitySchemes:
    CgsBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    ConversationId:
      name: conversation_id
      in: path
      required: true
      schema:
        type: string
    UploadId:
      name: upload_id
      in: path
      required: true
      schema:
        type: string
    DocumentId:
      name: document_id
      in: path
      required: true
      schema:
        type: string
    TenantIdPath:
      name: tenant_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    EnvelopeBase:
      type: object
      properties:
