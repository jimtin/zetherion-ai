# Docker Compose configuration for integration tests
# Uses different ports to avoid conflicts with running development environment

services:
  zetherion-ai-bot:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"  # Don't restart during tests
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    depends_on:
      qdrant:
        condition: service_healthy
      zetherion-ai-skills:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ${ZETHERION_ENV_FILE:-.env}
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - SKILLS_SERVICE_URL=http://zetherion-ai-skills:8080
      - ENVIRONMENT=test
      - EMBEDDINGS_BACKEND=${EMBEDDINGS_BACKEND:-openai}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      - OPENAI_EMBEDDING_DIMENSIONS=${OPENAI_EMBEDDING_DIMENSIONS:-3072}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - OLLAMA_ROUTER_HOST=ollama-router
      - OLLAMA_ROUTER_PORT=11434
      - POSTGRES_DSN=postgresql://zetherion:password@postgres:5432/zetherion
      - DISCORD_TOKEN=${DISCORD_TOKEN_TEST}
      - DISCORD_E2E_ENABLED=${DISCORD_E2E_ENABLED:-false}
      - DISCORD_E2E_ALLOWED_AUTHOR_IDS=${DISCORD_E2E_ALLOWED_AUTHOR_IDS:-}
      - DISCORD_E2E_GUILD_ID=${DISCORD_E2E_GUILD_ID:-}
      - DISCORD_E2E_CATEGORY_ID=${DISCORD_E2E_CATEGORY_ID:-}
      - DISCORD_E2E_CHANNEL_PREFIX=${DISCORD_E2E_CHANNEL_PREFIX:-zeth-e2e}
      - ALLOW_BOT_MESSAGES=true
      - ALLOW_ALL_USERS=true
      - ALLOWED_USER_IDS=1468994603633086485
      - OWNER_USER_ID=1468994603633086485
    volumes:
      - ${E2E_STACK_ROOT:-./.artifacts/ci-e2e-runs/static}/data:/app/data
      - ${E2E_STACK_ROOT:-./.artifacts/ci-e2e-runs/static}/logs:/app/logs
    networks:
      - zetherion-ai-test-net

  # Public API server for integration tests
  zetherion-ai-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ${ZETHERION_ENV_FILE:-.env}
    environment:
      - POSTGRES_DSN=postgresql://zetherion:password@postgres:5432/zetherion
      - API_HOST=0.0.0.0
      - API_PORT=8443
      - API_JWT_SECRET=test-jwt-secret-for-integration-tests-only
      - EMBEDDINGS_BACKEND=${EMBEDDINGS_BACKEND:-openai}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      - OPENAI_EMBEDDING_DIMENSIONS=${OPENAI_EMBEDDING_DIMENSIONS:-3072}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - OLLAMA_ROUTER_HOST=ollama-router
      - OLLAMA_ROUTER_PORT=11434
      - ENVIRONMENT=test
    # Expose port for integration test health checks
    ports:
      - "${E2E_API_HOST_PORT:-28443}:8443"
    networks:
      - zetherion-ai-test-net
    # Use Dockerfile HEALTHCHECK - distroless can only exec via ENTRYPOINT

  # CGS gateway server for integration tests
  zetherion-ai-cgs-gateway:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["-m", "zetherion_ai.cgs_gateway.server"]
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    depends_on:
      postgres:
        condition: service_healthy
      zetherion-ai-api:
        condition: service_healthy
      zetherion-ai-skills:
        condition: service_healthy
    env_file:
      - ${ZETHERION_ENV_FILE:-.env}
    environment:
      - POSTGRES_DSN=postgresql://zetherion:password@postgres:5432/zetherion
      - CGS_GATEWAY_HOST=0.0.0.0
      - CGS_GATEWAY_PORT=8443
      - ENCRYPTION_SALT_PATH=/app/data/salt.bin
      - CGS_AUTH_JWKS_URL=https://example.com/.well-known/jwks.json
      - CGS_AUTH_ISSUER=test-issuer
      - CGS_AUTH_AUDIENCE=test-audience
      - ZETHERION_PUBLIC_API_BASE_URL=http://zetherion-ai-api:8443
      - ZETHERION_SKILLS_API_BASE_URL=http://zetherion-ai-skills:8080
      - ZETHERION_SKILLS_API_SECRET=${ZETHERION_SKILLS_API_SECRET:-${SKILLS_API_SECRET:-test-skills-secret}}
      - ENVIRONMENT=test
    volumes:
      - ${E2E_STACK_ROOT:-./.artifacts/ci-e2e-runs/static}/data:/app/data
    ports:
      - "${E2E_CGS_GATEWAY_HOST_PORT:-28444}:8443"
    networks:
      - zetherion-ai-test-net

  zetherion-ai-skills:
    build:
      context: .
      dockerfile: Dockerfile.skills
    restart: "no"
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - ${ZETHERION_ENV_FILE:-.env}
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_DSN=postgresql://zetherion:password@postgres:5432/zetherion
      - SKILLS_HOST=0.0.0.0
      - SKILLS_PORT=8080
      - SKILLS_API_SECRET=${SKILLS_API_SECRET:-test-skills-secret}
      - ENCRYPTION_SALT_PATH=/app/data/salt.bin
      - EMBEDDINGS_BACKEND=${EMBEDDINGS_BACKEND:-openai}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      - OPENAI_EMBEDDING_DIMENSIONS=${OPENAI_EMBEDDING_DIMENSIONS:-3072}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    # Expose port for integration test health checks
    ports:
      - "${E2E_SKILLS_HOST_PORT:-18080}:8080"
    volumes:
      - ${E2E_STACK_ROOT:-./.artifacts/ci-e2e-runs/static}/data:/app/data
    networks:
      - zetherion-ai-test-net
    # Use Dockerfile HEALTHCHECK - distroless can only exec via ENTRYPOINT

  zetherion-ai-whatsapp-bridge:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp-bridge
    restart: "no"
    security_opt:
      - no-new-privileges:true
    depends_on:
      zetherion-ai-skills:
        condition: service_healthy
    env_file:
      - ${ZETHERION_ENV_FILE:-.env}
    environment:
      - WHATSAPP_BRIDGE_HOST=0.0.0.0
      - WHATSAPP_BRIDGE_PORT=8877
      - WHATSAPP_BRIDGE_BOOTSTRAP_SECRET=test-bootstrap-secret
      - WHATSAPP_BRIDGE_TENANT_ID=11111111-1111-1111-1111-111111111111
      - WHATSAPP_BRIDGE_INGEST_URL=http://zetherion-ai-skills:8080/bridge/v1/tenants/11111111-1111-1111-1111-111111111111/messaging/ingest
      - WHATSAPP_BRIDGE_SIGNING_SECRET=test-whatsapp-signing-secret
      - WHATSAPP_BRIDGE_SKILLS_API_SECRET=${SKILLS_API_SECRET:-test-skills-secret}
      - WHATSAPP_BRIDGE_STATE_PATH=/app/data/whatsapp-bridge-state.enc
      - WHATSAPP_BRIDGE_STATE_KEY=MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=
    ports:
      - "${E2E_WHATSAPP_BRIDGE_HOST_PORT:-18877}:8877"
    volumes:
      - ${E2E_STACK_ROOT:-./.artifacts/ci-e2e-runs/static}/data:/app/data
    networks:
      - zetherion-ai-test-net

  # Ollama Router Container (small, fast model for routing)
  ollama-router:
    image: ollama/ollama:latest@sha256:37ef34d78a6f4563a11cbbb336bbaa75f01eb19671d639973f98baa58f11a5ed
    restart: "no"
    profiles:
      - ollama
    security_opt:
      - no-new-privileges:true
    # Expose port for integration tests (host needs to reach router)
    ports:
      - "${E2E_OLLAMA_ROUTER_HOST_PORT:-31434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/11434' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - ollama_router_models_test:/root/.ollama
    networks:
      - zetherion-ai-test-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1536M

  # Ollama Generation Container (larger model for complex queries + embeddings)
  ollama:
    image: ollama/ollama:latest@sha256:37ef34d78a6f4563a11cbbb336bbaa75f01eb19671d639973f98baa58f11a5ed
    restart: "no"
    profiles:
      - ollama
    security_opt:
      - no-new-privileges:true
    # Use different host port for tests (21434 instead of 11434)
    ports:
      - "${E2E_OLLAMA_HOST_PORT:-21434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/11434' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ollama_models_test:/root/.ollama
    networks:
      - zetherion-ai-test-net
    # Match production resource limits (4 CPUs, 8GB)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G

  postgres:
    image: postgres:17-alpine
    restart: "no"
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: zetherion
      POSTGRES_USER: zetherion
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zetherion"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${E2E_POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data
    networks:
      - zetherion-ai-test-net

  qdrant:
    image: qdrant/qdrant:latest@sha256:0425e3e03e7fd9b3dc95c4214546afe19de2eb2e28ca621441a56663ac6e1f46
    restart: "no"
    security_opt:
      - no-new-privileges:true
    # Use different host port for tests (16333 instead of 6333)
    ports:
      - "${E2E_QDRANT_HOST_PORT:-16333}:6333"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - qdrant_storage_test:/qdrant/storage
    networks:
      - zetherion-ai-test-net

volumes:
  qdrant_storage_test:
  ollama_models_test:
  ollama_router_models_test:
  postgres_data_test:

networks:
  zetherion-ai-test-net:
    driver: bridge
