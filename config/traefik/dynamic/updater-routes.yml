http:
  routers:
    owner-ci-worker-bridge:
      entryPoints:
        - api
      rule: "PathPrefix(`/owner/ci/worker/v1`)"
      service: skills-blue
      priority: 30
    worker-bridge:
      entryPoints:
        - api
      rule: "PathPrefix(`/worker/v1`)"
      service: skills-blue
      priority: 30
    skills:
      entryPoints:
        - skills
      rule: "PathPrefix(`/`)"
      service: skills-blue
      priority: 10
    cgs-api:
      entryPoints:
        - api
      rule: "PathPrefix(`/service/ai/v1`)"
      service: cgs-api-blue
      priority: 20
    api:
      entryPoints:
        - api
      rule: "PathPrefix(`/`)"
      service: api-blue
      priority: 10
  services:
    skills-blue:
      loadBalancer:
        servers:
          - url: "http://zetherion-ai-skills-blue:8080"
    skills-green:
      loadBalancer:
        servers:
          - url: "http://zetherion-ai-skills-green:8080"
    api-blue:
      loadBalancer:
        servers:
          - url: "http://zetherion-ai-api-blue:8443"
    api-green:
      loadBalancer:
        servers:
          - url: "http://zetherion-ai-api-green:8443"
    cgs-api-blue:
      loadBalancer:
        servers:
          - url: "http://zetherion-ai-cgs-gateway-blue:8443"
    cgs-api-green:
      loadBalancer:
        servers:
          - url: "http://zetherion-ai-cgs-gateway-green:8443"
