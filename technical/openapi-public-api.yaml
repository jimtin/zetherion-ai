openapi: 3.1.0
info:
  title: Zetherion Upstream API
  version: 1.0.0
  description: Internal `/api/v1` upstream contract consumed by the CGS gateway. External clients should use CGS `/service/ai/v1`.
  x-maintenance-note: "2026-03-10: added upstream tenant notification routes for channel discovery, subscription CRUD, and event publishing on top of the shared announcement core. Email notifications use a tenant-connected Google mailbox when present; webhook delivery remains always available. sk_test_ keys are still restricted away from /api/v1/notifications/*. 2026-03-09: added upstream tenant sandbox controls, sk_test_ API-key handling for POST /api/v1/sessions plus /api/v1/test/*, execution_mode tagging on session tokens/sessions/messages/analytics rows, and deterministic test-mode chat/stream behavior that preserves the live wire format while suppressing tenant-derived writes. 2026-03-08: /api/v1/sessions now accepts optional memory_subject_id, derives a tenant-local subject when omitted, and returns conversation_summary metadata for tenant-scoped conversational recall. /api/v1/chat and /api/v1/chat/stream now assemble prompt context from tenant_raw session summaries plus tenant subject memories without changing auth modes or route paths. 2026-03-06: added internal data-plane isolation foundations (owner/tenant Qdrant routing, scoped object-storage prefixes, additive PostgreSQL isolation schemas, and owner-vs-tenant encryption domains) without changing the upstream /api/v1 route contract. 2026-03-05: added tenant messaging read/send routes plus document archive/delete + restore lifecycle updates."
servers:
  - url: https://{host}
    variables:
      host:
        default: api.example.com
security:
  - ApiKeyAuth: []
paths:
  /api/v1/health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: Healthy service status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/sessions:
    post:
      summary: Create tenant chat session
      description: Create a tenant-scoped session token and optionally bind the session to a stable tenant-local memory subject. When authenticated with sk_test_, the session is created in execution_mode=test and can optionally bind to a sandbox test profile.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreateRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Invalid session payload or test profile requested with a live key
        '404':
          description: Sandbox profile not found
  /api/v1/sessions/{session_id}:
    get:
      summary: Get session metadata
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionInfo'
    delete:
      summary: Delete session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session deleted
  /api/v1/test/profiles:
    get:
      summary: List sandbox profiles
      responses:
        '200':
          description: Sandbox profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestProfileListResponse'
    post:
      summary: Create sandbox profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestProfileCreateRequest'
      responses:
        '201':
          description: Sandbox profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestProfileRecord'
  /api/v1/test/profiles/{profile_id}:
    get:
      summary: Get sandbox profile
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      responses:
        '200':
          description: Sandbox profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestProfileRecord'
        '404':
          description: Sandbox profile not found
    patch:
      summary: Patch sandbox profile
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestProfilePatchRequest'
      responses:
        '200':
          description: Sandbox profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestProfileRecord'
        '404':
          description: Sandbox profile not found
    delete:
      summary: Delete sandbox profile
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      responses:
        '200':
          description: Sandbox profile deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          description: Sandbox profile not found
  /api/v1/test/profiles/{profile_id}/rules:
    get:
      summary: List sandbox rules
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      responses:
        '200':
          description: Sandbox rules
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestRuleListResponse'
        '404':
          description: Sandbox profile not found
    post:
      summary: Create sandbox rule
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestRuleCreateRequest'
      responses:
        '201':
          description: Sandbox rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestRuleRecord'
        '400':
          description: Invalid sandbox rule payload
        '404':
          description: Sandbox profile not found
  /api/v1/test/profiles/{profile_id}/preview:
    post:
      summary: Preview sandbox profile resolution
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestProfilePreviewRequest'
      responses:
        '200':
          description: Sandbox preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestProfilePreviewResponse'
        '400':
          description: Invalid preview payload
        '404':
          description: Sandbox profile not found
  /api/v1/test/profiles/{profile_id}/rules/{rule_id}:
    patch:
      summary: Patch sandbox rule
      parameters:
        - $ref: '#/components/parameters/ProfileId'
        - $ref: '#/components/parameters/RuleId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestRulePatchRequest'
      responses:
        '200':
          description: Sandbox rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestRuleRecord'
        '400':
          description: Invalid sandbox rule payload
        '404':
          description: Sandbox rule not found
    delete:
      summary: Delete sandbox rule
      parameters:
        - $ref: '#/components/parameters/ProfileId'
        - $ref: '#/components/parameters/RuleId'
      responses:
        '200':
          description: Sandbox rule deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          description: Sandbox rule not found
  /api/v1/notifications/channels:
    get:
      summary: List tenant notification channels
      description: Live-key route. Returns the public channels exposed by the shared announcement registry for this tenant.
      responses:
        '200':
          description: Notification channel list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationChannelListResponse'
  /api/v1/notifications/events:
    post:
      summary: Publish tenant notification event
      description: Live-key route. Publishes one tenant-scoped event and fans it out to all matching subscriptions through the shared announcement core.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationEventRequest'
      responses:
        '202':
          description: Notification event accepted for fan-out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPublishResponse'
        '400':
          description: Invalid notification event payload
  /api/v1/notifications/subscriptions:
    get:
      summary: List tenant notification subscriptions
      responses:
        '200':
          description: Notification subscriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSubscriptionListResponse'
    post:
      summary: Create tenant notification subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationSubscriptionCreateRequest'
      responses:
        '201':
          description: Subscription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSubscriptionRecord'
        '400':
          description: Invalid subscription payload
  /api/v1/notifications/subscriptions/{subscription_id}:
    patch:
      summary: Patch tenant notification subscription
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationSubscriptionPatchRequest'
      responses:
        '200':
          description: Subscription updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSubscriptionRecord'
        '400':
          description: Invalid subscription payload
        '404':
          description: Subscription not found
    delete:
      summary: Delete tenant notification subscription
      parameters:
        - $ref: '#/components/parameters/SubscriptionId'
      responses:
        '200':
          description: Subscription deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '404':
          description: Subscription not found
  /api/v1/chat:
    post:
      summary: Send a chat message
      security:
        - SessionBearerAuth: []
      responses:
        '200':
          description: Assistant message
  /api/v1/chat/stream:
    post:
      summary: Stream chat response (SSE)
      security:
        - SessionBearerAuth: []
      responses:
        '200':
          description: Streaming response
  /api/v1/chat/history:
    get:
      summary: Retrieve chat history
      security:
        - SessionBearerAuth: []
      responses:
        '200':
          description: Message history
  /api/v1/analytics/events:
    post:
      summary: Ingest analytics events
      security:
        - SessionBearerAuth: []
      responses:
        '201':
          description: Events accepted
  /api/v1/analytics/replay/chunks:
    post:
      summary: Upload replay chunk metadata
      security:
        - SessionBearerAuth: []
      responses:
        '201':
          description: Replay chunk accepted
  /api/v1/analytics/replay/chunks/{web_session_id}/{sequence_no}:
    get:
      summary: Get replay chunk metadata/data
      security:
        - SessionBearerAuth: []
      parameters:
        - name: web_session_id
          in: path
          required: true
          schema:
            type: string
        - name: sequence_no
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Replay chunk metadata
  /api/v1/analytics/sessions/end:
    post:
      summary: End analytics web session
      security:
        - SessionBearerAuth: []
      responses:
        '200':
          description: Session closed
  /api/v1/analytics/recommendations:
    get:
      summary: Get session recommendations
      security:
        - SessionBearerAuth: []
      responses:
        '200':
          description: Recommendations list
  /api/v1/analytics/recommendations/tenant:
    get:
      summary: Get tenant recommendations
      responses:
        '200':
          description: Tenant recommendation list
  /api/v1/analytics/funnel:
    get:
      summary: Get tenant funnel metrics
      responses:
        '200':
          description: Funnel metrics
  /api/v1/analytics/recommendations/{recommendation_id}/feedback:
    post:
      summary: Submit recommendation feedback
      security:
        - SessionBearerAuth: []
      parameters:
        - name: recommendation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Feedback recorded
  /api/v1/crm/contacts:
    get:
      summary: List tenant CRM contacts
      responses:
        '200':
          description: Contacts list
  /api/v1/crm/interactions:
    get:
      summary: List tenant CRM interactions
      responses:
        '200':
          description: Interactions list
  /api/v1/messaging/chats:
    get:
      summary: List tenant messaging chats and policy snapshots
      responses:
        '200':
          description: Messaging chat list
  /api/v1/messaging/messages:
    get:
      summary: List tenant messaging messages for one chat
      parameters:
        - name: chat_id
          in: query
          required: true
          schema:
            type: string
        - name: provider
          in: query
          required: false
          schema:
            type: string
            default: whatsapp
        - name: direction
          in: query
          required: false
          schema:
            type: string
            enum: [inbound, outbound]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Messaging message list
  /api/v1/messaging/messages/{chat_id}/send:
    post:
      summary: Queue outbound tenant messaging send
      parameters:
        - name: chat_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                provider:
                  type: string
                  default: whatsapp
                text:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
                explicitly_elevated:
                  type: boolean
                  default: false
      responses:
        '202':
          description: Messaging send queued
  /api/v1/releases/markers:
    post:
      summary: Ingest release marker
      responses:
        '201':
          description: Marker created

  /api/v1/documents/uploads:
    post:
      summary: Create document upload intent
      description: Creates a pending upload token for tenant-scoped document ingestion.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUploadCreateRequest'
      responses:
        '201':
          description: Upload intent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentUploadCreateResponse'
  /api/v1/documents/uploads/{upload_id}/complete:
    post:
      summary: Complete document upload
      description: Completes upload using base64 JSON payload or multipart file upload.
      parameters:
        - $ref: '#/components/parameters/UploadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUploadCompleteRequest'
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                metadata:
                  type: string
                  description: Optional JSON string metadata payload.
      responses:
        '201':
          description: Document created and queued for indexing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRecord'
  /api/v1/documents:
    get:
      summary: List tenant documents
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: include_archived
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include `archiving|archived|purged` documents when true.
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      $ref: '#/components/schemas/DocumentRecord'
                  count:
                    type: integer
  /api/v1/documents/{document_id}:
    get:
      summary: Get document metadata/status
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRecord'
    delete:
      summary: Schedule document archive/delete
      description: Marks an active document as archiving and enqueues archive work.
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - name: reason
          in: query
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '202':
          description: Archive request accepted (idempotent for archived states)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentArchiveResponse'
        '404':
          description: Document not found
        '409':
          description: Invalid lifecycle transition
  /api/v1/documents/{document_id}/preview:
    get:
      summary: Preview document content
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Inline preview stream (PDF, HTML, or text fallback)
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            text/html:
              schema:
                type: string
  /api/v1/documents/{document_id}/download:
    get:
      summary: Download raw document bytes
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: File download stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /api/v1/documents/{document_id}/index:
    post:
      summary: Re-index an existing tenant document
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Updated indexed document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRecord'
  /api/v1/documents/{document_id}/restore:
    post:
      summary: Restore archived document
      description: Restores archived document lifecycle state and runs re-indexing.
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Document restored and re-indexed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentRecord'
        '404':
          description: Document not found
        '409':
          description: Invalid lifecycle transition
  /api/v1/rag/query:
    post:
      summary: Query tenant document vectors with provider/model override
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagQueryRequest'
      responses:
        '200':
          description: RAG response with citations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagQueryResponse'
  /api/v1/models/providers:
    get:
      summary: List available retrieval providers/models
      responses:
        '200':
          description: Provider catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderCatalog'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    SessionBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProfileId:
      name: profile_id
      in: path
      required: true
      schema:
        type: string
    RuleId:
      name: rule_id
      in: path
      required: true
      schema:
        type: string
    SubscriptionId:
      name: subscription_id
      in: path
      required: true
      schema:
        type: string
    UploadId:
      name: upload_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DocumentId:
      name: document_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        service:
          type: string
      required: [status, service]
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]
    SessionCreateRequest:
      type: object
      properties:
        external_user_id:
          type: string
          nullable: true
        memory_subject_id:
          type: string
          nullable: true
          description: Stable tenant-local subject key for cross-session conversational memory. When omitted, the runtime derives it from external_user_id when available.
        test_profile_id:
          type: string
          nullable: true
          description: Optional sandbox profile ID. Only valid when creating the session with a sk_test_ API key.
        metadata:
          type: object
          additionalProperties: true
    SessionResponse:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        external_user_id:
          type: string
          nullable: true
        memory_subject_id:
          type: string
          nullable: true
        execution_mode:
          type: string
          enum: [live, test]
        test_profile_id:
          type: string
          nullable: true
        conversation_summary:
          type: string
          description: Rolling tenant-scoped summary of the active conversation.
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        session_token:
          type: string
      required: [session_id, tenant_id, execution_mode, conversation_summary, created_at, expires_at, session_token]
    SessionInfo:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        external_user_id:
          type: string
          nullable: true
        memory_subject_id:
          type: string
          nullable: true
        execution_mode:
          type: string
          enum: [live, test]
        test_profile_id:
          type: string
          nullable: true
        conversation_summary:
          type: string
          description: Rolling tenant-scoped summary of the active conversation.
        created_at:
          type: string
          format: date-time
        last_active:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
      required:
        - session_id
        - tenant_id
        - execution_mode
        - conversation_summary
        - created_at
        - last_active
        - expires_at
    TestProfileCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        is_default:
          type: boolean
          default: false
    TestProfilePatchRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        is_default:
          type: boolean
        is_active:
          type: boolean
    TestProfileRecord:
      type: object
      properties:
        profile_id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        is_default:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [profile_id, tenant_id, name, is_default, is_active, created_at, updated_at]
    TestProfileListResponse:
      type: object
      properties:
        profiles:
          type: array
          items:
            $ref: '#/components/schemas/TestProfileRecord'
        count:
          type: integer
      required: [profiles, count]
    TestRuleCreateRequest:
      type: object
      required: [route_pattern]
      properties:
        priority:
          type: integer
          default: 100
        method:
          type: string
          default: POST
        route_pattern:
          type: string
        enabled:
          type: boolean
          default: true
        match:
          type: object
          additionalProperties: true
        response:
          type: object
          additionalProperties: true
        latency_ms:
          type: integer
          minimum: 0
          default: 0
    TestRulePatchRequest:
      type: object
      properties:
        priority:
          type: integer
        method:
          type: string
        route_pattern:
          type: string
        enabled:
          type: boolean
        match:
          type: object
          additionalProperties: true
        response:
          type: object
          additionalProperties: true
        latency_ms:
          type: integer
          minimum: 0
    TestRuleRecord:
      type: object
      properties:
        rule_id:
          type: string
        tenant_id:
          type: string
        profile_id:
          type: string
        priority:
          type: integer
        method:
          type: string
        route_pattern:
          type: string
        enabled:
          type: boolean
        match:
          type: object
          additionalProperties: true
        response:
          type: object
          additionalProperties: true
        latency_ms:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
