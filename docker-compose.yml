services:
  zetherion-ai-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zetherion-ai-bot
    restart: unless-stopped
    # Security: read-only filesystem with writable tmpfs for temp files
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    depends_on:
      qdrant:
        condition: service_healthy
      zetherion-ai-skills-green:
        condition: service_healthy
      zetherion-ai-skills-blue:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_CERT_PATH=/app/data/certs/qdrant/ca.pem
      - SKILLS_SERVICE_URL=https://zetherion-ai-skills-green:8080,https://zetherion-ai-skills-blue:8080
      - POSTGRES_DSN=postgresql://zetherion:password@postgres:5432/zetherion
      - POSTGRES_USE_TLS=true
      - POSTGRES_TLS_CA_PATH=/app/data/certs/postgres/ca.pem
      - POSTGRES_TLS_CERT_PATH=/app/data/certs/postgres/client.pem
      - POSTGRES_TLS_KEY_PATH=/app/data/certs/postgres/client-key.pem
      - QDRANT_USE_TLS=true
      - STRICT_TRANSPORT_SECURITY=true
      - INTERNAL_TLS_CA_PATH=/app/data/certs/internal/ca.pem
      - INTERNAL_TLS_CLIENT_CERT_PATH=/app/data/certs/internal/client.pem
      - INTERNAL_TLS_CLIENT_KEY_PATH=/app/data/certs/internal/client-key.pem
      - ENVIRONMENT=production
      - LOG_FILE_PREFIX=bot
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - zetherion-ai-net
    # Use Dockerfile HEALTHCHECK - distroless can only exec via ENTRYPOINT
    # Resource limits to prevent runaway processes
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Public API server (blue deployment)
  zetherion-ai-api-blue:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: zetherion-ai-api-blue
    restart: unless-stopped
    # Security: read-only filesystem with writable tmpfs for temp files
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=postgresql://zetherion:password@postgres:5432/zetherion
      - API_HOST=0.0.0.0
      - API_PORT=8443
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_CERT_PATH=/app/data/certs/qdrant/ca.pem
      - QDRANT_USE_TLS=true
      - POSTGRES_USE_TLS=true
      - POSTGRES_TLS_CA_PATH=/app/data/certs/postgres/ca.pem
      - POSTGRES_TLS_CERT_PATH=/app/data/certs/postgres/client.pem
      - POSTGRES_TLS_KEY_PATH=/app/data/certs/postgres/client-key.pem
      - STRICT_TRANSPORT_SECURITY=true
      - INTERNAL_TLS_CA_PATH=/app/data/certs/internal/ca.pem
      - INTERNAL_TLS_CLIENT_CERT_PATH=/app/data/certs/internal/client.pem
      - INTERNAL_TLS_CLIENT_KEY_PATH=/app/data/certs/internal/client-key.pem
      - API_TLS_CERT_PATH=/app/data/certs/internal/api.pem
      - API_TLS_KEY_PATH=/app/data/certs/internal/api-key.pem
      - ENVIRONMENT=production
      - LOG_FILE_PREFIX=api-blue
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # No port exposed to host — accessed via Cloudflare Tunnel
    networks:
      - zetherion-ai-net
    # Use Dockerfile HEALTHCHECK - distroless can only exec via ENTRYPOINT
    # Resource limits for API service
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Public API server (green deployment)
  zetherion-ai-api-green:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: zetherion-ai-api-green
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=postgresql://zetherion:password@postgres:5432/zetherion
      - API_HOST=0.0.0.0
      - API_PORT=8443
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_CERT_PATH=/app/data/certs/qdrant/ca.pem
      - QDRANT_USE_TLS=true
      - POSTGRES_USE_TLS=true
      - POSTGRES_TLS_CA_PATH=/app/data/certs/postgres/ca.pem
      - POSTGRES_TLS_CERT_PATH=/app/data/certs/postgres/client.pem
      - POSTGRES_TLS_KEY_PATH=/app/data/certs/postgres/client-key.pem
      - STRICT_TRANSPORT_SECURITY=true
      - INTERNAL_TLS_CA_PATH=/app/data/certs/internal/ca.pem
      - INTERNAL_TLS_CLIENT_CERT_PATH=/app/data/certs/internal/client.pem
      - INTERNAL_TLS_CLIENT_KEY_PATH=/app/data/certs/internal/client-key.pem
      - API_TLS_CERT_PATH=/app/data/certs/internal/api.pem
      - API_TLS_KEY_PATH=/app/data/certs/internal/api-key.pem
      - ENVIRONMENT=production
      - LOG_FILE_PREFIX=api-green
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - zetherion-ai-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # CGS gateway server (blue deployment)
  zetherion-ai-cgs-gateway-blue:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: zetherion-ai-cgs-gateway-blue
    command: ["-m", "zetherion_ai.cgs_gateway.server"]
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=postgresql://zetherion:password@postgres:5432/zetherion
      - POSTGRES_USE_TLS=true
      - POSTGRES_TLS_CA_PATH=/app/data/certs/postgres/ca.pem
      - POSTGRES_TLS_CERT_PATH=/app/data/certs/postgres/client.pem
      - POSTGRES_TLS_KEY_PATH=/app/data/certs/postgres/client-key.pem
      - CGS_GATEWAY_HOST=0.0.0.0
      - CGS_GATEWAY_PORT=8443
      - ZETHERION_PUBLIC_API_BASE_URL=https://zetherion-ai-api-green:8443,https://zetherion-ai-api-blue:8443
      - ZETHERION_SKILLS_API_BASE_URL=https://zetherion-ai-skills-green:8080,https://zetherion-ai-skills-blue:8080
      - ZETHERION_SKILLS_API_SECRET=${ZETHERION_SKILLS_API_SECRET:-${SKILLS_API_SECRET:-}}
      - CGS_AUTH_JWKS_URL=${CGS_AUTH_JWKS_URL:-}
      - CGS_AUTH_ISSUER=${CGS_AUTH_ISSUER:-}
      - CGS_AUTH_AUDIENCE=${CGS_AUTH_AUDIENCE:-}
      - STRICT_TRANSPORT_SECURITY=true
      - INTERNAL_TLS_CA_PATH=/app/data/certs/internal/ca.pem
      - INTERNAL_TLS_CLIENT_CERT_PATH=/app/data/certs/internal/client.pem
      - INTERNAL_TLS_CLIENT_KEY_PATH=/app/data/certs/internal/client-key.pem
      - CGS_GATEWAY_TLS_CERT_PATH=/app/data/certs/internal/cgs-gateway.pem
      - CGS_GATEWAY_TLS_KEY_PATH=/app/data/certs/internal/cgs-gateway-key.pem
      - ENVIRONMENT=production
      - LOG_FILE_PREFIX=cgs-gateway-blue
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - zetherion-ai-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # CGS gateway server (green deployment)
  zetherion-ai-cgs-gateway-green:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: zetherion-ai-cgs-gateway-green
    command: ["-m", "zetherion_ai.cgs_gateway.server"]
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_DSN=postgresql://zetherion:password@postgres:5432/zetherion
      - POSTGRES_USE_TLS=true
      - POSTGRES_TLS_CA_PATH=/app/data/certs/postgres/ca.pem
      - POSTGRES_TLS_CERT_PATH=/app/data/certs/postgres/client.pem
      - POSTGRES_TLS_KEY_PATH=/app/data/certs/postgres/client-key.pem
      - CGS_GATEWAY_HOST=0.0.0.0
      - CGS_GATEWAY_PORT=8443
      - ZETHERION_PUBLIC_API_BASE_URL=https://zetherion-ai-api-green:8443,https://zetherion-ai-api-blue:8443
      - ZETHERION_SKILLS_API_BASE_URL=https://zetherion-ai-skills-green:8080,https://zetherion-ai-skills-blue:8080
      - ZETHERION_SKILLS_API_SECRET=${ZETHERION_SKILLS_API_SECRET:-${SKILLS_API_SECRET:-}}
      - CGS_AUTH_JWKS_URL=${CGS_AUTH_JWKS_URL:-}
      - CGS_AUTH_ISSUER=${CGS_AUTH_ISSUER:-}
      - CGS_AUTH_AUDIENCE=${CGS_AUTH_AUDIENCE:-}
      - STRICT_TRANSPORT_SECURITY=true
      - INTERNAL_TLS_CA_PATH=/app/data/certs/internal/ca.pem
      - INTERNAL_TLS_CLIENT_CERT_PATH=/app/data/certs/internal/client.pem
      - INTERNAL_TLS_CLIENT_KEY_PATH=/app/data/certs/internal/client-key.pem
      - CGS_GATEWAY_TLS_CERT_PATH=/app/data/certs/internal/cgs-gateway.pem
      - CGS_GATEWAY_TLS_KEY_PATH=/app/data/certs/internal/cgs-gateway-key.pem
      - ENVIRONMENT=production
      - LOG_FILE_PREFIX=cgs-gateway-green
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - zetherion-ai-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Cloudflare Tunnel — exposes the API to the internet without opening ports
  # Requires a Cloudflare Tunnel token (create at https://one.dash.cloudflare.com)
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: zetherion-ai-cloudflared
    profiles:
      - cloudflared
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-} # gitleaks:allow
    depends_on:
      traefik:
        condition: service_started
      zetherion-ai-api-blue:
        condition: service_healthy
      zetherion-ai-cgs-gateway-blue:
        condition: service_healthy
    networks:
      - zetherion-ai-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

  # Traefik reverse proxy for zero-downtime blue-green deployments (Phase 10A)
  traefik:
    image: traefik:v3.3
    container_name: zetherion-ai-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command:
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.api.address=:8443"
      - "--entrypoints.api.http.tls=true"
      - "--entrypoints.skills.address=:8080"
      - "--entrypoints.skills.http.tls=true"
      - "--api.insecure=false"
      - "--log.level=WARN"
    ports:
      - "127.0.0.1:${OWNER_CI_LOOPBACK_PORT:-18443}:8443"
      - "127.0.0.1:${TRAEFIK_DASHBOARD_PORT:-18080}:8080"
    volumes:
      - ./config/traefik/dynamic:/etc/traefik/dynamic
      - ./data/certs:/etc/traefik/certs:ro
    networks:
      - zetherion-ai-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

  zetherion-ai-skills-blue:
    build:
      context: .
      dockerfile: Dockerfile.skills
    container_name: zetherion-ai-skills-blue
    restart: unless-stopped
    # Security: read-only filesystem with writable tmpfs for temp files
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_CERT_PATH=/app/data/certs/qdrant/ca.pem
      - POSTGRES_DSN=postgresql://zetherion:password@postgres:5432/zetherion
      - POSTGRES_USE_TLS=true
      - POSTGRES_TLS_CA_PATH=/app/data/certs/postgres/ca.pem
      - POSTGRES_TLS_CERT_PATH=/app/data/certs/postgres/client.pem
      - POSTGRES_TLS_KEY_PATH=/app/data/certs/postgres/client-key.pem
      - SKILLS_HOST=0.0.0.0
      - SKILLS_PORT=8080
      - UPDATER_SERVICE_URL=https://zetherion-ai-updater:9090
      - UPDATER_SECRET_PATH=/app/data/.updater-secret
      - QDRANT_USE_TLS=true
      - STRICT_TRANSPORT_SECURITY=true
      - INTERNAL_TLS_CA_PATH=/app/data/certs/internal/ca.pem
      - INTERNAL_TLS_CLIENT_CERT_PATH=/app/data/certs/internal/client.pem
      - INTERNAL_TLS_CLIENT_KEY_PATH=/app/data/certs/internal/client-key.pem
      - SKILLS_TLS_CERT_PATH=/app/data/certs/internal/skills.pem
      - SKILLS_TLS_KEY_PATH=/app/data/certs/internal/skills-key.pem
      - LOG_FILE_PREFIX=skills-blue
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - zetherion-ai-net
    # Use Dockerfile HEALTHCHECK - distroless can only exec via ENTRYPOINT
    # Resource limits for skills service
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  zetherion-ai-skills-green:
    build:
      context: .
      dockerfile: Dockerfile.skills
    container_name: zetherion-ai-skills-green
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /home/nonroot/.cache
    depends_on:
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_CERT_PATH=/app/data/certs/qdrant/ca.pem
      - POSTGRES_DSN=postgresql://zetherion:password@postgres:5432/zetherion
      - POSTGRES_USE_TLS=true
      - POSTGRES_TLS_CA_PATH=/app/data/certs/postgres/ca.pem
      - POSTGRES_TLS_CERT_PATH=/app/data/certs/postgres/client.pem
      - POSTGRES_TLS_KEY_PATH=/app/data/certs/postgres/client-key.pem
      - SKILLS_HOST=0.0.0.0
      - SKILLS_PORT=8080
      - UPDATER_SERVICE_URL=https://zetherion-ai-updater:9090
      - UPDATER_SECRET_PATH=/app/data/.updater-secret
      - QDRANT_USE_TLS=true
      - STRICT_TRANSPORT_SECURITY=true
      - INTERNAL_TLS_CA_PATH=/app/data/certs/internal/ca.pem
      - INTERNAL_TLS_CLIENT_CERT_PATH=/app/data/certs/internal/client.pem
      - INTERNAL_TLS_CLIENT_KEY_PATH=/app/data/certs/internal/client-key.pem
      - SKILLS_TLS_CERT_PATH=/app/data/certs/internal/skills.pem
      - SKILLS_TLS_KEY_PATH=/app/data/certs/internal/skills-key.pem
      - LOG_FILE_PREFIX=skills-green
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - zetherion-ai-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Ollama Generation Container (large model + embeddings)
  # Handles complex queries and embedding generation
  ollama:
    # Pin image by digest for reproducible builds (Dependabot auto-updates)
    image: ollama/ollama:latest@sha256:37ef34d78a6f4563a11cbbb336bbaa75f01eb19671d639973f98baa58f11a5ed
    container_name: zetherion-ai-ollama
    profiles:
      - ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/11434' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - zetherion-ai-net
    # Resource limits for LLM inference (generation + embeddings)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
    # Uncomment for GPU support (NVIDIA)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Ollama Router Container (small, fast model for routing)
  # Dedicated container for message classification - always loaded
  ollama-router:
    # Pin image by digest for reproducible builds (Dependabot auto-updates)
    image: ollama/ollama:latest@sha256:37ef34d78a6f4563a11cbbb336bbaa75f01eb19671d639973f98baa58f11a5ed
    container_name: zetherion-ai-ollama-router
    profiles:
      - ollama
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # No port exposure to host - only accessible via internal network
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/11434' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s  # Faster startup for small model
    volumes:
      - ollama_router_models:/root/.ollama
    networks:
      - zetherion-ai-net
    # Resource limits for router (3b model needs ~2.5GB + inference overhead)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 1536M

  postgres:
    image: postgres:17-alpine
    container_name: zetherion-ai-postgres
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: ["sh", "/usr/local/bin/start-postgres-tls.sh"]
    environment:
      POSTGRES_DB: zetherion
      POSTGRES_USER: zetherion
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zetherion -h 127.0.0.1 -p 5432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/certs/postgres:/etc/postgres-certs:ro
      - ./config/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./scripts/postgres/start-postgres-tls.sh:/usr/local/bin/start-postgres-tls.sh:ro
    networks:
      - zetherion-ai-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M

  qdrant:
    # Pin image by digest for reproducible builds (Dependabot auto-updates)
    image: qdrant/qdrant:latest@sha256:0425e3e03e7fd9b3dc95c4214546afe19de2eb2e28ca621441a56663ac6e1f46
    container_name: zetherion-ai-qdrant
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "6333:6333"
    healthcheck:
      # TCP check works for both TLS and non-TLS modes
      test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./data/certs/qdrant:/qdrant/certs:ro
      - ./config/qdrant.yaml:/qdrant/config/production.yaml:ro
    networks:
      - zetherion-ai-net
    # Resource limits for vector database
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M

  # Updater Sidecar — handles git fetch/tag checkout, docker build, rolling restarts
  # This is the ONLY container with Docker socket write access
  zetherion-ai-updater:
    build:
      context: .
      dockerfile: Dockerfile.updater
    container_name: zetherion-ai-updater
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      - COMPOSE_FILE=/project/docker-compose.yml
      - PROJECT_DIR=/project
      - HEALTH_URLS=https://zetherion-ai-skills-blue:8080/health,https://zetherion-ai-skills-green:8080/health,https://zetherion-ai-api-blue:8443/health,https://zetherion-ai-api-green:8443/health,https://zetherion-ai-cgs-gateway-blue:8443/service/ai/v1/health,https://zetherion-ai-cgs-gateway-green:8443/service/ai/v1/health
      - UPDATER_SECRET_PATH=/app/data/.updater-secret
      - UPDATER_STATE_PATH=/app/data/updater-state.json
      - UPDATER_TRAEFIK_DYNAMIC_PATH=/project/config/traefik/dynamic/updater-routes.yml
      - STRICT_TRANSPORT_SECURITY=true
      - INTERNAL_TLS_CA_PATH=/app/data/certs/internal/ca.pem
      - INTERNAL_TLS_CLIENT_CERT_PATH=/app/data/certs/internal/client.pem
      - INTERNAL_TLS_CLIENT_KEY_PATH=/app/data/certs/internal/client-key.pem
      - UPDATER_TLS_CERT_PATH=/app/data/certs/internal/updater.pem
      - UPDATER_TLS_KEY_PATH=/app/data/certs/internal/updater-key.pem
      - UPDATER_TLS_REQUIRE_CLIENT_CERT=true
      - AUTO_UPDATE_PAUSE_ON_FAILURE=${AUTO_UPDATE_PAUSE_ON_FAILURE:-true}
      - UPDATER_VERIFY_SIGNATURES=${UPDATER_VERIFY_SIGNATURES:-true}
      - UPDATER_VERIFY_IDENTITY=${UPDATER_VERIFY_IDENTITY:-}
      - UPDATER_VERIFY_OIDC_ISSUER=${UPDATER_VERIFY_OIDC_ISSUER:-https://token.actions.githubusercontent.com}
      - UPDATER_VERIFY_REKOR_URL=${UPDATER_VERIFY_REKOR_URL:-https://rekor.sigstore.dev}
      - UPDATER_RELEASE_MANIFEST_ASSET=${UPDATER_RELEASE_MANIFEST_ASSET:-release-manifest.json}
      - UPDATER_RELEASE_SIGNATURE_ASSET=${UPDATER_RELEASE_SIGNATURE_ASSET:-release-manifest.sig}
      - UPDATER_RELEASE_CERTIFICATE_ASSET=${UPDATER_RELEASE_CERTIFICATE_ASSET:-release-manifest.pem}
    volumes:
      # Docker socket — READ/WRITE (required for build + restart)
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      # Project directory — for git operations and docker compose context
      - .:/project
      # Shared data volume — for auto-generated secret
      - ./data:/app/data
      # Persistent logs
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - zetherion-ai-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 64M

  # Dev Agent Sidecar — monitors Docker projects and runs policy-gated cleanup.
  zetherion-ai-dev-agent:
    build:
      context: .
      dockerfile: Dockerfile.dev-agent
    container_name: zetherion-ai-dev-agent
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      - ZETHERION_DEV_AGENT_HOME=/app/data/dev-agent
      - DEV_AGENT_API_HOST=0.0.0.0
      - DEV_AGENT_API_PORT=8787
      - DEV_AGENT_API_TLS_CERT_PATH=/app/data/certs/internal/dev-agent.pem
      - DEV_AGENT_API_TLS_KEY_PATH=/app/data/certs/internal/dev-agent-key.pem
      - DEV_AGENT_INTERNAL_TLS_CA_PATH=/app/data/certs/internal/ca.pem
      - DEV_AGENT_API_REQUIRE_CLIENT_CERT=true
      - DEV_AGENT_DATABASE_PATH=/app/data/dev-agent/daemon.db
      - DEV_AGENT_BOOTSTRAP_SECRET=${DEV_AGENT_BOOTSTRAP_SECRET:-}
      - DEV_AGENT_BOOTSTRAP_REQUIRE_ONCE=true
      - DEV_AGENT_CONTAINER_MONITOR_ENABLED=true
      - DEV_AGENT_CLEANUP_ENABLED=true
      - DEV_AGENT_CLEANUP_HOUR=${DEV_AGENT_CLEANUP_HOUR:-2}
      - DEV_AGENT_CLEANUP_MINUTE=${DEV_AGENT_CLEANUP_MINUTE:-30}
      - DEV_AGENT_APPROVAL_REPROMPT_HOURS=${DEV_AGENT_APPROVAL_REPROMPT_HOURS:-24}
      - DEV_AGENT_WEBHOOK_URL=
      - DEV_AGENT_NAME=${DEV_AGENT_WEBHOOK_NAME:-zetherion-dev-agent}
    command: ["zetherion-dev-agent", "daemon"]
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - zetherion-ai-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 64M

  # Local WhatsApp bridge sidecar (Segment 2)
  # Exposed on localhost only and scoped to signed messaging ingest.
  zetherion-ai-whatsapp-bridge:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp-bridge
    container_name: zetherion-ai-whatsapp-bridge
    profiles:
      - whatsapp-bridge
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      zetherion-ai-skills-blue:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - WHATSAPP_BRIDGE_HOST=0.0.0.0
      - WHATSAPP_BRIDGE_PORT=8877
      - WHATSAPP_BRIDGE_BOOTSTRAP_SECRET=${WHATSAPP_BRIDGE_BOOTSTRAP_SECRET:-}
      - WHATSAPP_BRIDGE_BOOTSTRAP_REQUIRE_ONCE=true
      - WHATSAPP_BRIDGE_TENANT_ID=${WHATSAPP_BRIDGE_TENANT_ID:-00000000-0000-0000-0000-000000000000}
      - WHATSAPP_BRIDGE_INGEST_URL=${WHATSAPP_BRIDGE_INGEST_URL:-https://zetherion-ai-skills-blue:8080/bridge/v1/tenants/${WHATSAPP_BRIDGE_TENANT_ID:-00000000-0000-0000-0000-000000000000}/messaging/ingest}
      - WHATSAPP_BRIDGE_SIGNING_SECRET=${WHATSAPP_BRIDGE_SIGNING_SECRET:-}
      - WHATSAPP_BRIDGE_SKILLS_API_SECRET=${WHATSAPP_BRIDGE_SKILLS_API_SECRET:-${SKILLS_API_SECRET:-}}
      - WHATSAPP_BRIDGE_STATE_PATH=/app/data/whatsapp-bridge-state.enc
      - WHATSAPP_BRIDGE_STATE_KEY=${WHATSAPP_BRIDGE_STATE_KEY:-}
    ports:
      - "127.0.0.1:8877:8877"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - zetherion-ai-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

volumes:
  qdrant_storage:
  ollama_models:
  ollama_router_models:
  postgres_data:

networks:
  zetherion-ai-net:
    driver: bridge
